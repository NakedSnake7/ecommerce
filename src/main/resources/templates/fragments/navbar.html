<!-- ===== NAVBAR FRAGMENT ===== -->
<section id="navbar" th:fragment="navbar">
  <div class="container nav-inner">
    
      <!-- LOGO -->
    <a th:href="@{/}" class="nav-logo">
      STR<span>I</span>DE
    </a>

    <!-- LINKS -->
    <ul class="nav-links">
      <li><a th:href="@{/categoria/hombres}">Hombres</a></li>
      <li><a th:href="@{/categoria/mujeres}">Mujeres</a></li>
      <li><a th:href="@{/novedades}">Novedades</a></li>
      <li><a th:href="@{/#banner}" class="ofertas">Ofertas</a></li>
    </ul>

    <!-- ACTIONS -->
    <div class="nav-actions">
      
      <!-- CARRITO -->
      <button class="cart-btn" id="cart-btn" aria-label="Ver carrito">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-badge" id="cart-badge" th:text="${cartCount != null ? cartCount : 0}">0</span>
      </button>

      <!-- LOGIN -->
      <button class="btn-login" th:onclick="|window.location.href='@{/login}'|">
        Iniciar sesión
      </button>

      <!-- HAMBURGER -->
      <button class="hamburger" id="hamburger" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>

    </div>
  </div>
</section>
