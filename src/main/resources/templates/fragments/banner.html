<section id="banner" th:fragment="banner">
  <div class="container" style="position:relative;z-index:2;">
    <p class="banner-eyebrow">Oferta por tiempo limitado</p>
    <h2 class="banner-title">Hasta 40% Off</h2>
    <p class="banner-sub">En selección de temporada — mientras duren existencias</p>
    <div class="countdown-wrap">
      <div class="countdown-box">
        <div class="countdown-num" id="cd-hours">00</div>
        <div class="countdown-label">Horas</div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-box">
        <div class="countdown-num" id="cd-mins">00</div>
        <div class="countdown-label">Min</div>
      </div>
      <div class="countdown-sep">:</div>
      <div class="countdown-box">
        <div class="countdown-num" id="cd-secs">00</div>
        <div class="countdown-label">Seg</div>
      </div>
    </div>
    <button class="btn-dark">Aprovechar Oferta</button>
  </div>
</section>
