<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Producto PRO</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
body{
    background:#1f1f1f;
    color:#fff;
    font-family:Arial, sans-serif;
}

#particles-js{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
}

.form-container{
    max-width:900px;
    margin:40px auto;
    background:#2c2c2c;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

.form-control{
    background:#3a3a3a;
    color:#fff;
    border:1px solid #555;
}

.form-control:focus{
    background:#3a3a3a;
    color:#fff;
    border-color:#28a745;
    box-shadow:none;
}

label{
    font-weight:bold;
}

.variante-box{
    background:#232323;
    border:1px solid #444;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

.talla-row{
    background:#303030;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.btn-block{
    width:100%;
}

.flotante{
    position:fixed;
    right:15px;
    bottom:15px;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<a href="/VerProductos" class="btn btn-success flotante">
Ver Productos
</a>

<div class="container">

<div class="form-container">

<h2 class="text-center mb-4">
Subir Producto Profesional
</h2>

<form id="productoForm"
th:action="@{/nuevo}"
th:object="${producto}"
method="post"
enctype="multipart/form-data">

<!-- NOMBRE -->
<div class="form-group">
<label>Nombre del producto</label>
<input type="text"
th:field="*{productName}"
class="form-control"
required>
</div>

<!-- PRECIO -->
<div class="form-group">
<label>Precio base</label>
<input type="number"
step="0.01"
th:field="*{price}"
class="form-control"
required>
</div>

<!-- STOCK GENERAL -->
<div class="form-group" id="stockGeneralBox">
<label>Stock general</label>
<input type="number"
min="0"
th:field="*{stockSimple}"
class="form-control">
</div>

<!-- DESCRIPCION -->
<div class="form-group">
<label>Descripción</label>
<textarea
th:field="*{description}"
rows="4"
class="form-control"></textarea>
</div>

<!-- CATEGORIA -->
<div class="form-group">
<label>Categoría</label>

<select class="form-control"
th:field="*{categoriaId}"
id="categoriaSelect">

<option value="">Selecciona</option>

<option th:each="cat : ${categorias}"
th:value="${cat.id}"
th:text="${cat.nombre}">
</option>

</select>
</div>

<!-- NUEVA -->
<div class="form-group">
<label>Nueva categoría</label>
<input type="text"
th:field="*{nuevaCategoria}"
class="form-control">
</div>

<!-- ATRIBUTOS -->
<div class="form-group">
<label>Atributos sugeridos</label>
<div id="atributosCategoria"></div>
</div>

<hr>

<h4>Variantes Color + Talla</h4>

<div id="variantes-container"></div>

<button type="button"
class="btn btn-info mt-2"
onclick="agregarColor()">

+ Agregar Color
</button>

<hr>

<div class="form-group">
<label>Descuento %</label>
<input type="number"
min="0"
max="100"
th:field="*{porcentajeDescuento}"
class="form-control">
</div>

<div class="form-group">
<label>Imágenes</label>
<input type="file"
name="imagenes"
multiple
class="form-control">
</div>

<button type="submit"
class="btn btn-success btn-lg btn-block">

Guardar Producto
</button>

</form>
</div>
</div>

<script>
/* ======================================
ATRIBUTOS AUTOMÁTICOS
====================================== */
const atributosPorCategoria = {
    ropa: ["Color", "Talla", "Material", "Género"],
    zapatos: ["Color", "Número", "Material"],
    tenis: ["Color", "Número", "Deporte"],
    celular: ["Color", "RAM", "Almacenamiento"],
    laptop: ["RAM", "SSD", "Procesador"],
    reloj: ["Color", "Correa", "Tamaño"],
    perfume: ["Aroma", "ML", "Género"]
};

document.addEventListener("DOMContentLoaded", () => {

    const categoria = document.getElementById("categoriaSelect");

    if (categoria) {
        categoria.addEventListener("change", cargarAtributos);
        cargarAtributos();
    }

    const form = document.getElementById("productoForm");

    if (form) {
        form.addEventListener("submit", sincronizarTodoAntesDeEnviar);
    }
});

function cargarAtributos() {

    const select = document.getElementById("categoriaSelect");
    const box = document.getElementById("atributosCategoria");

    if (!select || !box) return;

    const texto =
        select.options[select.selectedIndex]
        ?.text
        .toLowerCase()
        .trim();

    box.innerHTML = "";

    let lista = [];

    for (let key in atributosPorCategoria) {
        if (texto.includes(key)) {
            lista = atributosPorCategoria[key];
            break;
        }
    }

    if (lista.length === 0) {
        box.innerHTML =
            '<small class="text-muted">Sin atributos sugeridos</small>';
        return;
    }

    lista.forEach(attr => {
        box.innerHTML += `
        <span class="badge badge-success mr-2 mb-2 p-2">
            ${attr}
        </span>`;
    });
}
</script>

<script>
/* ======================================
VARIANTES COLOR + TALLA
====================================== */
let colorIndex = 0;
let varianteIndex = 0;

function agregarColor() {

    const stockGeneral =
        document.getElementById("stockGeneralBox");

    if (stockGeneral) {
        stockGeneral.style.display = "none";
    }

    const container =
        document.getElementById("variantes-container");

    container.insertAdjacentHTML(
        "beforeend",
        `
<div class="variante-box border rounded p-3 mt-3 bg-dark">

    <div class="d-flex justify-content-between mb-3">
        <h5 class="m-0 text-success">
            Color #${colorIndex + 1}
        </h5>

        <button type="button"
            class="btn btn-danger btn-sm"
            onclick="eliminarColor(this)">
            Eliminar
        </button>
    </div>

    <input type="text"
        class="form-control mb-3 nombre-color"
        placeholder="Ej: Negro">

    <div class="tallas-box"></div>

    <button type="button"
        class="btn btn-secondary btn-sm"
        onclick="agregarTalla(this)">
        + Agregar Talla
    </button>

</div>
`
    );

    colorIndex++;
}

function eliminarColor(btn) {

    btn.closest(".variante-box").remove();

    const quedan =
        document.querySelectorAll(".variante-box");

    if (quedan.length === 0) {
        const stockGeneral =
            document.getElementById("stockGeneralBox");

        if (stockGeneral) {
            stockGeneral.style.display = "block";
        }
    }
}

function agregarTalla(btn) {

    const box =
        btn.closest(".variante-box");

    const tallas =
        box.querySelector(".tallas-box");

    tallas.insertAdjacentHTML(
        "beforeend",
        `
<div class="talla-row border rounded p-2 mb-2">

    <div class="row">

        <div class="col-md-3 mb-2">
            <input type="text"
                class="form-control talla-input"
                placeholder="Talla">
        </div>

        <div class="col-md-3 mb-2">
            <input type="number"
                min="0"
                class="form-control stock-input"
                placeholder="Stock">
        </div>

        <div class="col-md-3 mb-2">
            <input type="number"
                min="0"
                step="0.01"
                class="form-control precio-input"
                placeholder="Precio">
        </div>

        <div class="col-md-3 mb-2">
            <button type="button"
                class="btn btn-danger btn-block"
                onclick="eliminarTalla(this)">
                X
            </button>
        </div>

    </div>

    <input type="hidden"
        name="variantes[${varianteIndex}].atributos[Color]"
        class="hidden-color">

    <input type="hidden"
        name="variantes[${varianteIndex}].atributos[Talla]"
        class="hidden-talla">

    <input type="hidden"
        name="variantes[${varianteIndex}].stock"
        class="hidden-stock">

    <input type="hidden"
        name="variantes[${varianteIndex}].precio"
        class="hidden-precio">

</div>
`
    );

    const row = tallas.lastElementChild;

    const colorInput = box.querySelector(".nombre-color");
    const talla = row.querySelector(".talla-input");
    const stock = row.querySelector(".stock-input");
    const precio = row.querySelector(".precio-input");

    const hColor = row.querySelector(".hidden-color");
    const hTalla = row.querySelector(".hidden-talla");
    const hStock = row.querySelector(".hidden-stock");
    const hPrecio = row.querySelector(".hidden-precio");

    function sync() {
        hColor.value = colorInput.value.trim();
        hTalla.value = talla.value.trim();
        hStock.value = stock.value;
        hPrecio.value = precio.value;
    }

    colorInput.addEventListener("input", sync);
    talla.addEventListener("input", sync);
    stock.addEventListener("input", sync);
    precio.addEventListener("input", sync);

    sync();

    varianteIndex++;
}

function eliminarTalla(btn) {
    btn.closest(".talla-row").remove();
}

/* ======================================
SYNC GLOBAL ANTES DE SUBMIT
====================================== */
function sincronizarTodoAntesDeEnviar() {

    document.querySelectorAll(".talla-row").forEach(row => {

        const box =
            row.closest(".variante-box");

        row.querySelector(".hidden-color").value =
            box.querySelector(".nombre-color").value.trim();

        row.querySelector(".hidden-talla").value =
            row.querySelector(".talla-input").value.trim();

        row.querySelector(".hidden-stock").value =
            row.querySelector(".stock-input").value;

        row.querySelector(".hidden-precio").value =
            row.querySelector(".precio-input").value;
    });
}
</script>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js",{
	  "particles": {
		    "number": {
		      "value": 90,
		      "density": { "enable": true, "value_area": 900 }
		    },
		    "color": {
		      "value": ["#00ffcc", "#2bff99", "#00e6b8"]
		    },
		    "shape": { "type": "circle" },
		    "opacity": {
		      "value": 0.35,
		      "random": true,
		      "anim": {
		        "enable": true,
		        "speed": 0.8,
		        "opacity_min": 0.05,
		        "sync": false
		      }
		    },
		    "size": {
		      "value": 4,
		      "random": true,
		      "anim": {
		        "enable": true,
		        "speed": 2,
		        "size_min": 0.6,
		        "sync": false
		      }
		    },
		    "line_linked": {
		      "enable": true,
		      "distance": 150,
		      "color": "#00ffcc",
		      "opacity": 0.35,
		      "width": 1
		    },
		    "move": {
		      "enable": true,
		      "speed": 1.3,
		      "direction": "none",
		      "random": true,
		      "straight": false,
		      "out_mode": "out",
		      "bounce": false
		    }
		  },
		  "interactivity": {
		    "detect_on": "canvas",
		    "events": {
		      "onhover": { "enable": true, "mode": "grab" },
		      "onclick": { "enable": false },
		      "resize": true
		    },
		    "modes": {
		      "grab": { 
		        "distance": 200,
		        "line_linked": { "opacity": 0.8 }
		      }
		    }
		  },
		  "retina_detect": true
		});
</script>

</body>
</html>
