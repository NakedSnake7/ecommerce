<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRIDE Product Manager</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
body{
background:#111;
color:#fff;
font-family:Arial,sans-serif;
}

.wrap{
max-width:1250px;
margin:auto;
padding:40px 20px;
}

.box{
background:#1b1b1b;
padding:28px;
border-radius:18px;
margin-bottom:25px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.title{
font-size:34px;
font-weight:800;
margin-bottom:25px;
}

label{
font-weight:700;
margin-bottom:8px;
}

input,textarea,select{
background:#262626 !important;
color:#fff !important;
border:1px solid #444 !important;
}

input:focus,textarea:focus,select:focus{
box-shadow:none !important;
border-color:#888 !important;
}

.color-box{
background:#232323;
border:1px solid #333;
border-radius:16px;
padding:20px;
margin-bottom:18px;
}

.size-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(78px,1fr));
gap:10px;
margin-top:16px;
}

.size-chip{
padding:11px;
border-radius:10px;
text-align:center;
cursor:pointer;
font-weight:700;
border:1px solid #555;
transition:.2s;
}

.size-chip:hover{
transform:translateY(-2px);
}

.size-chip.active{
background:#fff;
color:#000;
border-color:#fff;
}

.table-stock{
margin-top:18px;
}

.table-stock td{
vertical-align:middle;
padding:8px;
}

.btn-main{
background:#fff;
color:#000;
border:none;
font-weight:800;
padding:15px;
border-radius:12px;
width:100%;
}

.counter{
font-size:13px;
color:#aaa;
margin-top:10px;
}
</style>
</head>

<body>

<div class="wrap">

<form id="productoForm"
th:action="@{/nuevo}"
th:object="${producto}"
method="post"
enctype="multipart/form-data">

<!-- JSON -->
<input type="hidden"
name="variantesJson"
id="variantesJson">

<!-- INFO -->
<div class="box">

<div class="title">PRODUCT MANAGER</div>

<div class="form-group">
<label>Nombre Producto</label>
<input type="text"
th:field="*{productName}"
class="form-control"
required>
</div>

<div class="row">

<div class="col-md-4">
<div class="form-group">
<label>Precio Base</label>
<input type="number"
step="0.01"
id="precioBase"
th:field="*{price}"
class="form-control">
</div>
</div>

<div class="col-md-4">
<div class="form-group">
<label>Categoría</label>
<select class="form-control"
th:field="*{categoriaId}">
<option value="">Selecciona</option>
<option th:each="cat:${categorias}"
th:value="${cat.id}"
th:text="${cat.nombre}">
</option>
</select>
</div>
</div>

<div class="col-md-4">
<div class="form-group">
<label>Descuento %</label>
<input type="number"
th:field="*{porcentajeDescuento}"
class="form-control">
</div>
</div>

</div>

<div class="form-group">
<label>Descripción</label>
<textarea rows="4"
th:field="*{description}"
class="form-control"></textarea>
</div>

<div class="form-group">
<label>Imágenes</label>
<input type="file"
name="imagenes"
multiple
class="form-control">
</div>

</div>

<!-- VARIANTES -->
<div class="box">

<h4>Variantes Premium</h4>

<div id="colorsWrap"></div>

<button type="button"
class="btn btn-success mt-2"
onclick="addColor()">

+ Agregar Color

</button>

<div class="counter"
id="counterInfo">
0 variantes creadas
</div>

</div>

<!-- SAVE -->
<div class="box">
<button class="btn-main">
GUARDAR PRODUCTO
</button>
</div>

</form>
</div>

<script>
const tallas=[
"22","22.5","23","23.5",
"24","24.5","25","25.5",
"26","26.5","27","27.5",
"28","28.5","29"
];

let variantes=[];

function addColor(){

const wrap=document.getElementById("colorsWrap");

wrap.insertAdjacentHTML("beforeend",`

<div class="color-box">

<div class="d-flex justify-content-between align-items-center mb-3">

<input type="text"
class="form-control color-name mr-2"
placeholder="Nombre color">

<button type="button"
class="btn btn-danger btn-sm"
onclick="removeColor(this)">

Eliminar

</button>

</div>

<div class="size-grid"></div>

<table class="table table-dark table-stock">
<thead>
<tr>
<th>Talla</th>
<th>Stock</th>
<th>Precio</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

`);

const box=wrap.lastElementChild;
const grid=box.querySelector(".size-grid");

tallas.forEach(t=>{

const chip=document.createElement("div");
chip.className="size-chip";
chip.textContent=t;

chip.onclick=()=>toggleSize(box,t,chip);

grid.appendChild(chip);

});

}

function toggleSize(box,talla,chip){

chip.classList.toggle("active");

const tbody=box.querySelector("tbody");

if(chip.classList.contains("active")){

tbody.insertAdjacentHTML("beforeend",`

<tr data-size="${talla}">

<td>${talla}</td>

<td>
<input type="number"
class="form-control stock"
min="0"
value="0">
</td>

<td>
<input type="number"
class="form-control price"
step="0.01"
value="${document.getElementById('precioBase').value || 0}">
</td>

<td>
<button type="button"
class="btn btn-danger btn-sm"
onclick="removeRow(this,'${talla}')">

X

</button>
</td>

</tr>

`);

bindInputs(box);

}else{

const row=tbody.querySelector('[data-size="'+talla+'"]');
if(row) row.remove();

}

syncVariantes();

}

function removeRow(btn,talla){

const row=btn.closest("tr");
const box=btn.closest(".color-box");

row.remove();

box.querySelectorAll(".size-chip").forEach(ch=>{
if(ch.textContent===talla){
ch.classList.remove("active");
}
});

syncVariantes();

}

function removeColor(btn){

btn.closest(".color-box").remove();

syncVariantes();

}

function bindInputs(box){

box.querySelectorAll("input").forEach(i=>{
i.oninput=syncVariantes;
});

}

function syncVariantes(){

variantes=[];

document.querySelectorAll(".color-box").forEach(box=>{

const color=
box.querySelector(".color-name").value.trim();

box.querySelectorAll("tbody tr").forEach(row=>{

variantes.push({

color:color || "Sin color",
talla:row.dataset.size,
stock:Number(row.querySelector(".stock").value || 0),
precio:Number(row.querySelector(".price").value || 0)

});

});

});

document.getElementById("variantesJson").value=
JSON.stringify(variantes);

document.getElementById("counterInfo").textContent=
variantes.length+" variantes creadas";

console.log(variantes);

}

document
.getElementById("productoForm")
.addEventListener("submit",function(){

syncVariantes();

});

addColor();
</script>

</body>
</html>
