<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STRIDE Product Manager</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
body{
background:#0f0f0f;
color:#fff;
font-family:Arial,sans-serif;
}

.wrap{
max-width:1400px;
margin:auto;
padding:40px 20px;
}

.box{
background:#1c1c1c;
padding:28px;
border-radius:18px;
margin-bottom:25px;
box-shadow:0 0 25px rgba(0,0,0,.35);
}

.title{
font-size:34px;
font-weight:800;
margin-bottom:25px;
}

label{
font-weight:700;
margin-bottom:8px;
}

input,textarea,select{
background:#262626 !important;
color:#fff !important;
border:1px solid #444 !important;
}

input:focus,textarea:focus,select:focus{
box-shadow:none !important;
border-color:#888 !important;
}

.size-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
gap:10px;
margin-top:15px;
}

.size-chip{
padding:11px;
text-align:center;
border-radius:10px;
cursor:pointer;
font-weight:700;
border:1px solid #555;
transition:.2s;
}

.size-chip:hover{
transform:translateY(-2px);
}

.size-chip.active{
background:#fff;
color:#000;
border-color:#fff;
}

.color-box{
background:#232323;
padding:20px;
border-radius:14px;
margin-bottom:18px;
border:1px solid #333;
}

.btn-main{
background:#fff;
color:#000;
border:none;
font-weight:800;
padding:15px;
border-radius:12px;
width:100%;
}

.counter{
font-size:13px;
color:#aaa;
margin-top:12px;
}

.brand-create{
display:none;
margin-top:10px;
}

.small-note{
font-size:12px;
color:#aaa;
margin-top:5px;
}
</style>
</head>

<body>

<div class="wrap">

<form id="productoForm"
th:action="@{/nuevo}"
th:object="${producto}"
method="post"
enctype="multipart/form-data">

<input type="hidden"
name="variantesJson"
id="variantesJson">

<!-- DATOS -->
<div class="box">

<div class="title">PRODUCT MANAGER</div>

<div class="form-group">
<label>Nombre Producto</label>
<input type="text"
th:field="*{productName}"
class="form-control"
required>
</div>

<div class="row">

<!-- PRECIO -->
<div class="col-md-3">
<div class="form-group">
<label>Precio Base</label>
<input type="number"
step="0.01"
th:field="*{price}"
id="precioBase"
class="form-control">
</div>
</div>

<!-- CATEGORIA -->
<div class="col-md-3">
<div class="form-group">
<label>Categoría</label>

<select class="form-control"
th:field="*{categoriaId}"
id="categoriaSelect">

<option value="">Selecciona</option>

<option value="1">Calzado</option>
<option value="2">Ropa</option>
<option value="3">Accesorios</option>
<option value="4">Electrónica</option>
<option value="5">Computación</option>
<option value="6">Celulares</option>
<option value="7">Gaming</option>
<option value="8">Hogar</option>
<option value="9">Muebles</option>
<option value="10">Decoración</option>
<option value="11">Belleza</option>
<option value="12">Salud</option>
<option value="13">Deportes</option>
<option value="14">Fitness</option>
<option value="15">Mascotas</option>
<option value="16">Herramientas</option>
<option value="17">Automotriz</option>
<option value="18">Juguetes</option>
<option value="19">Bebés</option>
<option value="20">Papelería</option>
<option value="21">Libros</option>
<option value="22">Cursos Digitales</option>
<option value="23">Software</option>
<option value="24">Plantillas Digitales</option>
<option value="25">Ebooks</option>
<option value="26">Música Digital</option>
<option value="27">Fotografía</option>
<option value="28">Video</option>
<option value="29">Servicios</option>
<option value="30">Otros</option>

</select>
</div>
</div>

<!-- MARCA -->
<div class="col-md-3">
<div class="form-group">

<label>Marca</label>

<select class="form-control"
th:field="*{marcaId}"
id="marcaSelect">

<option value="">Selecciona</option>

<option th:each="m : ${marcas}"
th:value="${m.id}"
th:text="${m.nombre}">
</option>

<option value="NUEVA_MARCA">
+ Crear Nueva Marca
</option>

</select>

<div id="brandCreateBox"
class="brand-create">

<input type="text"
name="nuevaMarca"
id="nuevaMarca"
class="form-control mt-2"
placeholder="Nombre de la nueva marca">

<div class="small-note">
Si escribes una marca nueva se creará automáticamente.
</div>

</div>

</div>
</div>

<!-- DESCUENTO -->
<div class="col-md-3">
<div class="form-group">
<label>Descuento %</label>
<input type="number"
th:field="*{porcentajeDescuento}"
class="form-control">
</div>
</div>

</div>

<!-- DESCRIPCION -->
<div class="form-group">
<label>Descripción</label>
<textarea rows="4"
th:field="*{description}"
class="form-control"></textarea>
</div>

<!-- IMAGENES -->
<div class="form-group">
<label>Imágenes</label>
<input type="file"
name="imagenes"
multiple
class="form-control">
</div>

</div>

<!-- VARIANTES -->
<div class="box">

<h4>Variantes Automáticas</h4>

<div id="colorsWrap"></div>

<button type="button"
class="btn btn-success mt-3"
onclick="addColor()">

+ Agregar Variante

</button>

<div class="counter"
id="counterInfo">
0 variantes creadas
</div>

</div>

<!-- SAVE -->
<div class="box">
<button class="btn-main">
GUARDAR PRODUCTO
</button>
</div>

</form>
</div>

<script>
let variantes=[];

/* ===========================
   CREAR NUEVA MARCA
=========================== */
document
.getElementById("marcaSelect")
.addEventListener("change",function(){

const box=
document.getElementById("brandCreateBox");

if(this.value==="NUEVA_MARCA"){
box.style.display="block";
}else{
box.style.display="none";
document.getElementById("nuevaMarca").value="";
}

});

/* ===========================
   PRESETS
=========================== */
const presets={

Calzado:[
"22","22.5","23","23.5","24","24.5",
"25","25.5","26","26.5","27","27.5",
"28","28.5","29"
],

Ropa:["XS","S","M","L","XL","XXL"],

Accesorios:["Único"],

Electrónica:["64GB","128GB","256GB"],

Computación:["8GB","16GB","32GB"],

Celulares:["64GB","128GB","256GB"],

Gaming:["Standard","Deluxe"],

Hogar:["Pequeño","Mediano","Grande"],

Digital:["Descarga"]

};

function getPreset(){

const text=
document.getElementById("categoriaSelect")
.options[
document.getElementById("categoriaSelect")
.selectedIndex
].text;

if(text==="Calzado") return presets.Calzado;
if(text==="Ropa") return presets.Ropa;
if(text==="Accesorios") return presets.Accesorios;
if(text==="Electrónica") return presets.Electrónica;
if(text==="Computación") return presets.Computación;
if(text==="Celulares") return presets.Celulares;
if(text==="Gaming") return presets.Gaming;
if(text==="Hogar") return presets.Hogar;

return presets.Digital;
}

/* ===========================
   VARIANTES
=========================== */
function addColor(){

const wrap=document.getElementById("colorsWrap");

wrap.insertAdjacentHTML("beforeend",`

<div class="color-box">

<div class="d-flex justify-content-between mb-3">

<input type="text"
class="form-control color-name"
placeholder="Color / Variante">

<button type="button"
class="btn btn-danger btn-sm ml-2"
onclick="removeColor(this)">
Eliminar
</button>

</div>

<div class="size-grid"></div>

<table class="table table-dark mt-3">
<thead>
<tr>
<th>Variante</th>
<th>Stock</th>
<th>Precio</th>
<th></th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

`);

loadSizes(wrap.lastElementChild);

}

function loadSizes(box){

const grid=box.querySelector(".size-grid");
grid.innerHTML="";

getPreset().forEach(t=>{

const chip=document.createElement("div");
chip.className="size-chip";
chip.textContent=t;

chip.onclick=()=>toggleSize(box,t,chip);

grid.appendChild(chip);

});

}

function toggleSize(box,talla,chip){

chip.classList.toggle("active");

const tbody=box.querySelector("tbody");

if(chip.classList.contains("active")){

tbody.insertAdjacentHTML("beforeend",`

<tr data-size="${talla}">
<td>${talla}</td>

<td>
<input type="number"
class="form-control stock"
value="0">
</td>

<td>
<input type="number"
class="form-control price"
value="${document.getElementById('precioBase').value || 0}">
</td>

<td>
<button type="button"
class="btn btn-danger btn-sm"
onclick="removeRow(this,'${talla}')">
X
</button>
</td>

</tr>

`);

}else{

const row=
tbody.querySelector('[data-size="'+talla+'"]');

if(row) row.remove();

}

sync();

}

function removeRow(btn,talla){

const row=btn.closest("tr");
const box=btn.closest(".color-box");

row.remove();

box.querySelectorAll(".size-chip")
.forEach(ch=>{

if(ch.textContent===talla){
ch.classList.remove("active");
}

});

sync();

}

function removeColor(btn){

btn.closest(".color-box").remove();
sync();

}

function sync(){

variantes=[];

document
.querySelectorAll(".color-box")
.forEach(box=>{

const color=
box.querySelector(".color-name").value || "Base";

box.querySelectorAll("tbody tr")
.forEach(row=>{

variantes.push({

color:color,
talla:row.dataset.size,
stock:Number(
row.querySelector(".stock").value || 0
),
precio:Number(
row.querySelector(".price").value || 0
)

});

});

});

document.getElementById("variantesJson").value=
JSON.stringify(variantes);

document.getElementById("counterInfo").textContent=
variantes.length+" variantes creadas";

}

document
.getElementById("productoForm")
.addEventListener("submit",function(){
sync();
});

document
.getElementById("categoriaSelect")
.addEventListener("change",function(){

document
.querySelectorAll(".color-box")
.forEach(box=>loadSizes(box));

});

addColor();
</script>

</body>
</html>
