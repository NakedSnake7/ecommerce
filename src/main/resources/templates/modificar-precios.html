<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modificar Precios</title>

<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #1f1f1f;
    color: #fff;
}

.container {
    margin-top: 40px;
}

.table input {
    background-color: #2c2c2c;
    color: #fff;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 6px;
    width: 120px;
}

.table-secondary {
    opacity: 0.55;
}

.hint {
    font-size: 0.85rem;
    color: #9ca3af;
}
</style>
</head>

<body>

<div class="container">
    <h2 class="text-center mb-1">💲 Modificar Precios</h2>
    <p class="text-center hint mb-4">
        Edita el precio y presiona <strong>Enter</strong> para guardar
    </p>

    <div class="table-responsive">
    
 <div class="d-flex flex-wrap align-items-center mb-3 gap-2">

  <select id="filtroCategoria"
          class="form-control form-control-sm"
          style="max-width:220px">
    <option value="">Todas las categorías</option>
    <option th:each="cat : ${categorias}"
            th:value="${cat}"
            th:text="${cat}">
    </option>
  </select>

  <input type="text"
         id="buscarNombre"
         class="form-control form-control-sm"
         style="max-width:260px"
         placeholder="Buscar producto...">

  <small class="text-muted">
    Filtrar por categoría o nombre
  </small>
</div>


  <small class="text-muted">
    Filtrar productos por categoría
  </small>
</div>
    
    
    <div class="card bg-dark border-secondary mb-3">
  <div class="card-body d-flex flex-wrap align-items-center gap-2">

    <select id="categoriaSelect" class="form-control form-control-sm mr-2"
            style="max-width:220px">
      <option value="">Categoría</option>
      <option th:each="cat : ${categorias}"
              th:value="${cat}"
              th:text="${cat}">
      </option>
    </select>

    <select id="modoSelect" class="form-control form-control-sm mr-2"
            style="max-width:160px">
      <option value="MONTO">Monto fijo ($)</option>
      <option value="PORCENTAJE">Porcentaje (%)</option>
    </select>

    <input type="number"
           id="valorInput"
           class="form-control form-control-sm mr-2"
           style="max-width:160px"
           placeholder="+10 / -5">

    <button class="btn btn-warning btn-sm"
            onclick="aplicarAjusteCategoria()">
      Aplicar
    </button>

    <small class="text-muted ml-2">
      Monto: +50 / -20 · %: +10 / -5
    </small>
  </div>
</div>
    
        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Precio actual</th>
                    <th>Nuevo precio</th>
                </tr>
            </thead>
            <tbody>

<tr th:each="producto : ${productos}"
    th:attr="
        data-categoria=${producto.categoria.nombre},
        data-nombre=${#strings.toLowerCase(producto.productName)}
    "
    th:classappend="${!producto.visibleEnMenu} ? 'table-secondary'">


                <td th:text="${producto.id}"></td>
                <td>
                <span class="text-muted" th:text="${producto.categoria.nombre}"></span>
                <span class="mx-1">·</span>
                <strong th:text="${producto.productName}"></strong>
                </td>


                <td th:text="'$' + ${#numbers.formatDecimal(producto.price,1,2)}"></td>

                <td>
                   <input type="number"
       step="0.01"
       min="0"
       class="price-input"
       th:attr="data-id=${producto.id}"
       placeholder="Nuevo precio">

                </td>
            </tr>

            </tbody>
        </table>
    </div>

    <a href="/servicio" class="btn btn-outline-light mt-3">⬅ Volver</a>

<script>
const filtroCategoria = document.getElementById('filtroCategoria');
const buscarNombre = document.getElementById('buscarNombre');

function aplicarFiltros() {

    const categoria = filtroCategoria.value;
    const texto = buscarNombre.value.toLowerCase().trim();

    document.querySelectorAll('tbody tr').forEach(fila => {

        const catFila = fila.dataset.categoria;
        const nombreFila = fila.dataset.nombre;

        const coincideCategoria =
            !categoria || catFila === categoria;

        const coincideNombre =
            !texto || nombreFila.includes(texto);

        fila.style.display =
            (coincideCategoria && coincideNombre) ? '' : 'none';
    });
}

filtroCategoria.addEventListener('change', aplicarFiltros);
buscarNombre.addEventListener('input', aplicarFiltros);
</script>


<script>
function aplicarAjusteCategoria() {

    const categoria = document.getElementById('categoriaSelect').value;
    const modo = document.getElementById('modoSelect').value;
    const valor = document.getElementById('valorInput').value;

    if (!categoria || !valor) {
        alert('Selecciona categoría y valor');
        return;
    }

    const textoModo = modo === 'MONTO' ? 'monto' : 'porcentaje';

    if (!confirm(`¿Aplicar ${valor} (${textoModo}) a "${categoria}"?`)) {
        return;
    }

    fetch('/api/productos/ajustarPrecioCategoria', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
            categoria: categoria,
            valor: valor,
            modo: modo
        })
    })
    .then(res => {
        if (!res.ok) throw new Error();
        alert('Precios actualizados correctamente');
        location.reload();
    })
    .catch(() => alert('Error al ajustar precios'));
}
</script>

<script>
document.querySelectorAll('.price-input').forEach((input, index, inputs) => {

    input.addEventListener('keydown', function (e) {

        if (e.key !== 'Enter') return;

        e.preventDefault();

        const productoId = this.dataset.id;
        const nuevoPrecio = this.value;

        if (!nuevoPrecio || nuevoPrecio <= 0) {
            marcarError(this);
            return;
        }

        fetch('/api/productos/actualizarPrecio', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                productoId: productoId,
                precio: nuevoPrecio
            })
        })
        .then(res => {
            if (!res.ok) throw new Error();
            marcarGuardado(this);

            // 👉 foco automático al siguiente
            if (inputs[index + 1]) {
                inputs[index + 1].focus();
                inputs[index + 1].select();
            }
        })
        .catch(() => marcarError(this));
    });

});

/* ===============================
   FEEDBACK VISUAL
================================ */
function marcarGuardado(input) {
    input.style.borderColor = '#22c55e';
    input.style.backgroundColor = 'rgba(34,197,94,0.15)';

    setTimeout(() => {
        input.style.borderColor = '';
        input.style.backgroundColor = '';
    }, 900);
}

function marcarError(input) {
    input.style.borderColor = '#ef4444';
    input.style.backgroundColor = 'rgba(239,68,68,0.2)';

    setTimeout(() => {
        input.style.borderColor = '';
        input.style.backgroundColor = '';
    }, 1200);
}
</script>

</body>
</html>
