<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title th:text="${title} ?: 'STRIDE'">
        STRIDE
    </title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <!-- Fonts -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
          rel="stylesheet">

    <!-- CSS dinámico -->
    <link rel="stylesheet"
          th:href="@{|/themes/${theme}/assets/css/style.css|}">

</head>

<body>

<header
    th:replace="~{themes/__${theme}__/fragments/navbar :: navbar}">
</header>

<div
    th:replace="~{themes/__${theme}__/fragments/cart :: cart}">
</div>

<div
    th:replace="~{themes/__${theme}__/fragments/checkout :: checkout}">
</div>

<div
    th:replace="~{themes/__${theme}__/fragments/auth :: auth}">
</div>

   <!-- AQUÍ VA EL CONTENIDO DE index.html -->
    <main th:replace="${content}"></main>


<footer
    th:replace="~{themes/__${theme}__/fragments/footer :: footer}">
</footer>

<div
    th:replace="~{themes/__${theme}__/fragments/scripts :: scripts}">
</div>


    <script>
        document.documentElement.classList.add('js-enabled');
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
</body>
</html>
