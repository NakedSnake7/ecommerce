<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title th:text="${title} ?: 'STRIDE'">STRIDE</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <!-- Fonts -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          th:href="@{/assets/css/stride.css}">
</head>
<body>

    <!-- NAVBAR -->
    <header th:replace="~{fragments/navbar :: navbar}"></header>


    <!-- COMPONENTES GLOBALES -->
    
    <!-- Carrito -->
    <div th:replace="~{fragments/cart :: cart}"></div>

    <!-- Checkout -->
    <div th:replace="~{fragments/checkout :: checkout}"></div>

    <!-- Auth -->
    <div th:replace="~{fragments/auth :: auth}"></div>


    <!-- CONTENIDO DE CADA PÁGINA -->
    <main th:replace="${content}"></main>


    <!-- FOOTER -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>


    <!-- SCRIPTS -->
    <div th:replace="~{fragments/scripts :: scripts}"></div>


    <script>
        document.documentElement.classList.add('js-enabled');
    </script>
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
