<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administrar Reseñas</title>

<link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<!-- <link rel="stylesheet" href="/assets/css/custom-styles.css"> -->

<style>
body {
    background: #2c2c2c;
    color: #fff;
}
</style>
<style>
.review-card-inner {
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.review-card-inner:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.img-container {
    overflow: hidden;
    height: 200px;
}

.img-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
}

.img-container:hover img {
    transform: scale(1.05);
}

.stars {
    font-size: 1.2rem;
    color: gold;
}

.comment {
    font-size: 0.95rem;
    opacity: 0.9;
}
</style>
</head>

<body>

<!-- ================= FORMULARIO ================= -->
<div class="container mt-5">
    <h2 class="text-center mb-4">Agregar Nueva Reseña</h2>

    <form th:action="@{/resenas/nueva}"
          th:object="${resena}"
          method="post"
          enctype="multipart/form-data"
          class="bg-dark p-4 rounded">

        <div class="form-group">
            <label>Nombre</label>
            <input th:field="*{nombre}" class="form-control" required>
        </div>

       <div class="form-group">
    <label>Imagen</label>
    <input type="file" name="imagen" class="form-control"
           accept="image/jpeg,image/png,image/webp" required>
</div>

        <div class="form-group">
            <label>Comentario</label>
            <textarea th:field="*{comentario}" class="form-control" required></textarea>
        </div>

        <div class="form-group">
            <label>Estrellas</label>
            <select th:field="*{estrellas}" class="form-control" required>
                <option value="1">1 ⭐</option>
                <option value="2">2 ⭐</option>
                <option value="3">3 ⭐</option>
                <option value="4">4 ⭐</option>
                <option value="5">5 ⭐</option>
            </select>
        </div>

        <div class="form-check mb-3">
            <input th:field="*{verificado}" type="checkbox" class="form-check-input">
            <label class="form-check-label">Usuario verificado</label>
        </div>

        <button class="btn btn-success btn-block">Guardar reseña</button>
    </form>
</div>

<!-- ================= LISTADO ADMIN ================= -->
<div class="container mt-5">
    <h3 class="mb-4 text-center">⭐ Reseñas de clientes</h3>

    <div class="row">

        <div class="col-md-4 mb-4 review-card"
             th:each="r : ${resenas}"
             th:attr="data-id=${r.id}">

            <div class="card h-100 shadow-sm border-0 review-card-inner bg-dark text-light">

                <!-- Imagen -->
                <div class="img-container">
                    <img th:src="${r.imagenUrl} ?: '/imgs/default.png'"
                         class="card-img-top">
                </div>

                <div class="card-body d-flex flex-column">

                    <!-- Nombre -->
                    <h5 class="mb-1 font-weight-bold">
                        <span th:text="${r.nombre}"></span>
                        <span th:if="${r.verificado}" class="badge badge-success ml-2">
                            ✔ Verificado
                        </span>
                    </h5>

                    <!-- Estrellas -->
                    <div class="mb-2">
                        <span class="stars" th:attr="id='stars-' + ${r.id}">
                            <span th:each="i : ${#numbers.sequence(1, r.estrellas)}">⭐</span>
                        </span>
                    </div>

                    <!-- Comentario -->
                    <p class="comment flex-grow-1"
                       th:attr="id='comment-' + ${r.id}"
                       th:text="${r.comentario}">
                    </p>

                    <!-- Upload -->
                    <input type="file"
                           class="form-control mb-2 edit-image"
                           th:attr="id='edit-image-' + ${r.id}">

                    <!-- Botones -->
                    <div class="mt-auto">

                        <button class="btn btn-outline-danger btn-sm btn-block mb-2 delete-image"
                                th:attr="data-id=${r.id}">
                            🗑️ Eliminar imagen
                        </button>

                        <button class="btn btn-warning btn-sm btn-block btn-edit"
                                th:attr="data-id=${r.id},data-estrellas=${r.estrellas}">
                            ✏️ Editar
                        </button>

                        <button class="btn btn-danger btn-sm btn-block mt-2 btn-delete"
                                th:attr="data-id=${r.id}">
                            Eliminar reseña
                        </button>

                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<script>
document.addEventListener("click", e => {

    const del = e.target.closest(".btn-delete");
    if (del) {
        const id = del.dataset.id;
        if (!confirm("¿Eliminar reseña?")) return;

        fetch(`/resenas/eliminar/${id}`, { method: "DELETE" })
            .then(() => document.querySelector(`.review-card[data-id='${id}']`)?.remove());
    }

    const delImg = e.target.closest(".delete-image");
    if (delImg) {
        const id = delImg.dataset.id;
        if (!confirm("¿Eliminar imagen?")) return;

        fetch(`/resenas/${id}/imagen`, { method: "DELETE" })
            .then(() => {
                const img = document.querySelector(`.review-card[data-id='${id}'] img`);
                if (img) img.src = "/imgs/default.png";
            });
    }

    const edit = e.target.closest(".btn-edit");
    if (!edit) return;

    const id = edit.dataset.id;
    const estrellas = edit.dataset.estrellas;

    const commentEl = document.getElementById(`comment-${id}`);
    const starsEl = document.getElementById(`stars-${id}`);

    const original = commentEl.innerText;

    commentEl.innerHTML = `
        <textarea class="form-control mb-2" id="edit-comment-${id}">${original}</textarea>
        <select class="form-control mb-2" id="edit-stars-${id}">
            <option value="1">1 ⭐</option>
            <option value="2">2 ⭐</option>
            <option value="3">3 ⭐</option>
            <option value="4">4 ⭐</option>
            <option value="5">5 ⭐</option>
        </select>
        <button class="btn btn-success btn-sm" id="save-${id}">Guardar</button>
        <button class="btn btn-secondary btn-sm" id="cancel-${id}">Cancelar</button>
    `;

    document.getElementById(`edit-stars-${id}`).value = estrellas;

    document.getElementById(`cancel-${id}`).onclick = () => {
        commentEl.innerText = original;
    };

    document.getElementById(`save-${id}`).onclick = () => {
        const comentario = document.getElementById(`edit-comment-${id}`).value;
        const nuevasEstrellas = document.getElementById(`edit-stars-${id}`).value;

        fetch(`/resenas/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ comentario, estrellas: nuevasEstrellas })
        })
        .then(res => res.json())
        .then(data => {
            commentEl.innerText = data.comentario;
            starsEl.innerHTML = "⭐".repeat(data.estrellas);
            edit.dataset.estrellas = data.estrellas;
        });

        const imgInput = document.getElementById(`edit-image-${id}`);
        if (imgInput.files.length) {
            const fd = new FormData();
            fd.append("imagen", imgInput.files[0]);

            fetch(`/resenas/${id}/imagen`, { method: "PUT", body: fd })
                .then(r => r.json())
                .then(d => {
                    const img = document.querySelector(`.review-card[data-id='${id}'] img`);
                    if (img) img.src = d.imagenUrl;
                });
        }
    };
});
</script>

</body>
</html>
