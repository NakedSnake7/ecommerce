<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Editar Producto</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>
:root{
--bg:#0b0b0d;
--card:#141418;
--card2:#1b1c21;
--line:#2a2b31;
--text:#f4f4f5;
--muted:#9ca3af;
--green:#10b981;
--blue:#3b82f6;
--red:#ef4444;
--gold:#f59e0b;
}

*{box-sizing:border-box}

body{
margin:0;
background:linear-gradient(135deg,#0a0a0a,#111827,#0b0b0d);
min-height:100vh;
color:var(--text);
font-family:Inter,system-ui;
}

.wrapper{
max-width:1300px;
margin:auto;
padding:30px 15px;
}

.glass{
background:rgba(20,20,24,.92);
border:1px solid rgba(255,255,255,.05);
backdrop-filter:blur(12px);
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.header{
padding:28px;
margin-bottom:22px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
flex-wrap:wrap;
}

.title{
font-size:2rem;
font-weight:800;
margin:0;
}

.sub{
color:var(--muted);
margin-top:5px;
}

.section{
padding:24px;
margin-bottom:22px;
}

label{
font-weight:700;
font-size:.92rem;
margin-bottom:7px;
display:block;
}

.form-control{
background:#111216;
border:1px solid var(--line);
color:#fff;
border-radius:14px;
padding:12px 14px;
height:auto;
}

.form-control:focus{
background:#111216;
color:white;
border-color:#3b82f6;
box-shadow:none;
}

textarea.form-control{
min-height:130px;
resize:vertical;
}

.btn{
border:none;
border-radius:14px;
padding:11px 18px;
font-weight:700;
}

.btn-pro{
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
}

.btn-save{
background:linear-gradient(135deg,#10b981,#059669);
color:white;
}

.btn-danger{
background:linear-gradient(135deg,#ef4444,#dc2626);
}

.btn-light{
background:#fff;
color:#111;
}

.variant-card{
background:var(--card2);
border:1px solid var(--line);
border-radius:18px;
padding:18px;
margin-bottom:16px;
}

.attr-row{
display:grid;
grid-template-columns:1fr 1fr auto;
gap:10px;
margin-bottom:10px;
}

.badge-stock{
padding:7px 12px;
border-radius:40px;
font-size:.8rem;
font-weight:700;
display:inline-block;
}

.in{
background:rgba(16,185,129,.15);
color:#34d399;
}

.out{
background:rgba(239,68,68,.15);
color:#f87171;
}

.img-box{
position:relative;
border-radius:16px;
overflow:hidden;
border:1px solid var(--line);
margin-bottom:15px;
}

.img-box img{
width:100%;
height:200px;
object-fit:cover;
}

.img-actions{
position:absolute;
right:10px;
bottom:10px;
}

.dropzone{
border:2px dashed #374151;
border-radius:18px;
padding:35px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.dropzone:hover{
border-color:#3b82f6;
background:rgba(59,130,246,.05);
}

.toast-box{
position:fixed;
right:20px;
top:20px;
z-index:99999;
padding:14px 18px;
border-radius:14px;
font-weight:700;
display:none;
min-width:240px;
}

.toast-success{background:#10b981;color:white;}
.toast-error{background:#ef4444;color:white;}

.loader{
display:none;
width:20px;
height:20px;
border:3px solid rgba(255,255,255,.2);
border-top:3px solid white;
border-radius:50%;
animation:spin .8s linear infinite;
margin-right:8px;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

@media(max-width:768px){
.attr-row{
grid-template-columns:1fr;
}
.title{
font-size:1.45rem;
}
}
</style>
</head>

<body>

<div id="toast" class="toast-box"></div>

<div class="wrapper">

<!-- HEADER -->
<div class="glass header">
<div>
<h1 class="title">Editar Producto</h1>
<div class="sub" th:text="${productoDTO.productName}">Producto</div>
</div>

<div>
<button type="button"
class="btn btn-light"
onclick="history.back()">
Volver
</button>
</div>
</div>

<!-- FORM -->
<form id="formEditar"
th:action="@{'/api/productos/editar/' + ${productoDTO.id}}"
method="post"
enctype="multipart/form-data">

<input type="hidden" name="id" th:value="${productoDTO.id}">

<!-- DATOS -->
<div class="glass section">

<div class="row">

<div class="col-md-6 mb-3">
<label>Nombre</label>
<input class="form-control"
name="productName"
th:value="${productoDTO.productName}">
</div>

<div class="col-md-3 mb-3">
<label>Precio Base</label>
<input type="number"
step="0.01"
class="form-control"
name="precio"
th:value="${productoDTO.precio}">
</div>

<div class="col-md-3 mb-3"
id="stockSimpleBox"
th:style="${productoDTO.tieneVariantes}? 'display:none;' : 'display:block;'">
<label>Stock General</label>
<input type="number"
class="form-control"
name="stockSimple"
id="stockSimple"
th:value="${productoDTO.stockSimple}">
</div>

<div class="col-md-6 mb-3">
<label>Marca</label>
<select class="form-control" name="marcaId">
<option value="">Sin marca</option>
<option th:each="m : ${marcas}"
th:value="${m.id}"
th:text="${m.nombre}"
th:selected="${m.id == productoDTO.marcaId}">
</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Categoría</label>
<select class="form-control" name="categoriaId">
<option value="">Seleccionar</option>
<option th:each="cat : ${categorias}"
th:value="${cat.id}"
th:text="${cat.nombre}"
th:selected="${cat.id == productoDTO.categoriaId}">
</option>
</select>
</div>

<div class="col-md-3 mb-3">
<label>Descuento %</label>
<input type="number"
class="form-control"
name="porcentajeDescuento"
th:value="${productoDTO.porcentajeDescuento}">
</div>

<div class="col-md-12 mb-3">
<label>Descripción</label>
<textarea class="form-control"
name="description"
th:text="${productoDTO.description}"></textarea>
</div>

</div>
</div>

<!-- VARIANTES -->
<div class="glass section">

<div class="d-flex justify-content-between align-items-center mb-3">
<h4 class="m-0">Variantes</h4>

<button type="button"
class="btn btn-pro"
id="addVariante">
+ Agregar Variante
</button>
</div>

<div id="variantesWrap">

<div class="variant-card"
th:each="v,iter : ${productoDTO.variantes}"
th:attr="data-index=${iter.index}">

<input type="hidden"
th:name="|variantes[${iter.index}].id|"
th:value="${v.id}">

<div class="row">

<div class="col-md-4 mb-2">
<label>Stock</label>
<input type="number"
class="form-control stock-input"
th:name="|variantes[${iter.index}].stock|"
th:value="${v.stock}">
</div>

<div class="col-md-4 mb-2">
<label>Precio</label>
<input type="number"
step="0.01"
class="form-control"
th:name="|variantes[${iter.index}].precio|"
th:value="${v.precio}">
</div>

<div class="col-md-4 mb-2 d-flex align-items-end">
<span class="badge-stock"
th:classappend="${v.stock > 0 ? ' in':' out'}"
th:text="${v.stock > 0 ? 'Con stock':'Agotado'}">
</span>
</div>

</div>

<div class="atributos-container mt-2">

<div class="attr-row"
th:each="entry,i : ${v.atributos}">

<input type="text"
class="form-control"
th:name="|variantes[${iter.index}].atributosKeys[${i.index}]|"
th:value="${entry.key}"
placeholder="Nombre">

<input type="text"
class="form-control"
th:name="|variantes[${iter.index}].atributosValues[${i.index}]|"
th:value="${entry.value}"
placeholder="Valor">

<button type="button"
class="btn btn-danger removeAttr">
X
</button>

</div>

</div>

<div class="mt-2">
<button type="button"
class="btn btn-info btn-sm addAttr">
+ Atributo
</button>

<button type="button"
class="btn btn-danger btn-sm removeVariante">
Eliminar
</button>
</div>

</div>

</div>

</div>

<!-- IMAGENES -->
<div class="glass section">

<h4 class="mb-3">Imágenes</h4>

<div class="row">

<div class="col-md-4"
th:each="img,iter : ${productoDTO.urlsImagenesExistentes}">

<div class="img-box">

<img th:src="${img}">

<div class="img-actions">

<button type="button"
class="btn btn-danger btn-sm btnEliminarImagen"
th:data-id="${productoDTO.imagenesExistentes[iter.index]}"
th:data-producto="${productoDTO.id}">
Eliminar
</button>

</div>
</div>
</div>

</div>

<div class="dropzone mt-3" id="dropzone">
Haz click o arrastra imágenes aquí
<input hidden
multiple
type="file"
name="imagenes"
id="imagenes"
accept="image/*">
</div>

<div class="row mt-3" id="preview"></div>

</div>

<!-- SAVE -->
<div class="text-center mb-5">

<button class="btn btn-save btn-lg px-5"
type="submit">

<span id="loader" class="loader"></span>
<span id="btnText">Guardar Cambios</span>

</button>

</div>

</form>
</div>

<script>
/* ==========================
TOAST
========================== */
function toast(msg,type='success'){
const t=document.getElementById('toast');
t.className='toast-box ' + (type==='success' ? 'toast-success':'toast-error');
t.innerText=msg;
t.style.display='block';
setTimeout(()=>t.style.display='none',2500);
}

/* ==========================
BADGES
========================== */
function actualizarBadgeStock(input){
const badge=input.closest('.variant-card')
.querySelector('.badge-stock');

if(Number(input.value)>0){
badge.innerText='Con stock';
badge.className='badge-stock in';
}else{
badge.innerText='Agotado';
badge.className='badge-stock out';
}
}

function controlarStockSimple(){
const box=document.getElementById('stockSimpleBox');
const cards=document.querySelectorAll('.variant-card');
box.style.display=cards.length===0?'block':'none';
}

/* ==========================
REINDEX
========================== */
function reindexVariantes(){

document.querySelectorAll('.variant-card')
.forEach((card,index)=>{

card.dataset.index=index;

card.querySelectorAll('input').forEach(input=>{
if(!input.name)return;
input.name=input.name.replace(
/variantes\[\d+]/g,
`variantes[${index}]`
);
});

card.querySelectorAll('.attr-row')
.forEach((row,i)=>{

const inputs=row.querySelectorAll('input');

inputs[0].name=
`variantes[${index}].atributosKeys[${i}]`;

inputs[1].name=
`variantes[${index}].atributosValues[${i}]`;

});
});

controlarStockSimple();
}

/* ==========================
ADD VARIANTE
========================== */
document.getElementById('addVariante')
.addEventListener('click',()=>{

const wrap=document.getElementById('variantesWrap');
const i=document.querySelectorAll('.variant-card').length;

wrap.insertAdjacentHTML('beforeend',`

<div class="variant-card" data-index="${i}">

<div class="row">

<div class="col-md-4 mb-2">
<label>Stock</label>
<input type="number"
class="form-control stock-input"
name="variantes[${i}].stock"
value="0">
</div>

<div class="col-md-4 mb-2">
<label>Precio</label>
<input type="number"
step="0.01"
class="form-control"
name="variantes[${i}].precio">
</div>

<div class="col-md-4 mb-2 d-flex align-items-end">
<span class="badge-stock out">
Agotado
</span>
</div>

</div>

<div class="atributos-container mt-2"></div>

<div class="mt-2">
<button type="button"
class="btn btn-info btn-sm addAttr">
+ Atributo
</button>

<button type="button"
class="btn btn-danger btn-sm removeVariante">
Eliminar
</button>
</div>

</div>
`);

controlarStockSimple();

});

/* ==========================
EVENTOS GLOBALES
========================== */
document.addEventListener('click',e=>{

if(e.target.classList.contains('removeVariante')){
e.target.closest('.variant-card').remove();
reindexVariantes();
}

if(e.target.classList.contains('addAttr')){

const card=e.target.closest('.variant-card');
const i=card.dataset.index;
const c=card.querySelector('.atributos-container');
const n=c.querySelectorAll('.attr-row').length;

c.insertAdjacentHTML('beforeend',`

<div class="attr-row">

<input type="text"
class="form-control"
name="variantes[${i}].atributosKeys[${n}]"
placeholder="Nombre">

<input type="text"
class="form-control"
name="variantes[${i}].atributosValues[${n}]"
placeholder="Valor">

<button type="button"
class="btn btn-danger removeAttr">
X
</button>

</div>
`);
}

if(e.target.classList.contains('removeAttr')){
e.target.closest('.attr-row').remove();
reindexVariantes();
}

if(e.target.classList.contains('btnEliminarImagen')){
eliminarImagen(e.target);
}

});

document.addEventListener('input',e=>{
if(e.target.classList.contains('stock-input')){
actualizarBadgeStock(e.target);
}
});

/* ==========================
DROPZONE
========================== */
const dz=document.getElementById('dropzone');
const file=document.getElementById('imagenes');
const preview=document.getElementById('preview');

dz.onclick=()=>file.click();

file.onchange=()=>{

preview.innerHTML='';

[...file.files].forEach(f=>{

const reader=new FileReader();

reader.onload=e=>{

preview.insertAdjacentHTML('beforeend',`

<div class="col-md-3 mb-3">
<div class="img-box">
<img src="${e.target.result}">
</div>
</div>

`);

};

reader.readAsDataURL(f);

});
};

/* ==========================
DELETE IMG
========================== */
async function eliminarImagen(btn){

if(!confirm('¿Eliminar imagen?')) return;

const id=btn.dataset.id;
const producto=btn.dataset.producto;

const r=await fetch(
`/api/productos/${producto}/eliminar-imagen/${id}`,
{method:'DELETE'}
);

if(r.ok){
btn.closest('.col-md-4').remove();
toast('Imagen eliminada');
}else{
toast('No se pudo eliminar','error');
}
}

/* ==========================
SUBMIT AJAX
========================== */
document.getElementById('formEditar')
.addEventListener('submit',async e=>{

e.preventDefault();

reindexVariantes();

const form=e.target;
const loader=document.getElementById('loader');
const text=document.getElementById('btnText');

loader.style.display='inline-block';
text.innerText='Guardando...';

try{

const resp=await fetch(form.action,{
method:'POST',
body:new FormData(form)
});

const data=await resp.json();

if(resp.ok && data.success){

toast('Producto actualizado 🔥');

setTimeout(()=>{
location.href='/admin/productos';
},1200);

}else{
toast(data.error || 'Error al guardar','error');
}

}catch(err){
toast('Error de conexión','error');
}

loader.style.display='none';
text.innerText='Guardar Cambios';

});

/* ==========================
INIT
========================== */
controlarStockSimple();
</script>

</body>
</html>
