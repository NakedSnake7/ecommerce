<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>Login | STRIDE</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Fonts STRIDE -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            color: white;
            font-family: 'DM Sans', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;
            position: relative;
        }

        /* Fondo glow */
        body::before {
            content: "";
            position: absolute;

            width: 600px;
            height: 600px;

            background: radial-gradient(
                circle,
                rgba(255,255,255,0.08),
                transparent 70%
            );

            top: -200px;
            right: -200px;
        }

        body::after {
            content: "";
            position: absolute;

            width: 500px;
            height: 500px;

            background: radial-gradient(
                circle,
                rgba(255,255,255,0.05),
                transparent 70%
            );

            bottom: -150px;
            left: -150px;
        }

        .login-wrapper {
            position: relative;
            z-index: 2;

            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {

            background: rgba(255,255,255,0.04);

            border: 1px solid rgba(255,255,255,0.08);

            backdrop-filter: blur(16px);

            border-radius: 24px;

            padding: 40px 32px;

            box-shadow:
                0 10px 40px rgba(0,0,0,.45);
        }

        .brand {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 3px;

            text-align: center;
            margin-bottom: 10px;
        }

        .brand span {
            color: #999;
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 35px;
            font-size: .95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: .9rem;
            margin-bottom: 8px;
            color: #bbb;
        }

        input {
            width: 100%;

            padding: 14px 16px;

            border-radius: 14px;

            border: 1px solid #222;

            background: #111;

            color: white;

            font-size: .95rem;

            transition: .25s ease;
        }

        input:focus {
            outline: none;
            border-color: #555;
            background: #151515;
        }

        .login-btn {
            width: 100%;

            border: none;

            background: white;
            color: black;

            padding: 15px;

            border-radius: 14px;

            font-weight: 600;

            cursor: pointer;

            transition: .25s ease;

            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            background: #ddd;
        }

        .extra-links {
            margin-top: 25px;
            text-align: center;
            font-size: .9rem;
        }

        .extra-links a {
            color: #999;
            text-decoration: none;
        }

        .extra-links a:hover {
            color: white;
        }

        /* Alertas spring security */
        .alert {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: .9rem;
            text-align: center;
        }

        .alert-error {
            background: rgba(255,0,0,.12);
            color: #ff7b7b;
        }

        .alert-success {
            background: rgba(0,255,150,.08);
            color: #80ffc0;
        }

    </style>

</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <!-- BRAND -->
        <h1 class="brand">
            STR<span>I</span>DE
        </h1>

        <p class="subtitle">
            Accede a tu cuenta
        </p>


        <!-- ERROR LOGIN -->
        <div th:if="${param.error}"
             class="alert alert-error">

            Credenciales incorrectas

        </div>


        <!-- LOGOUT -->
        <div th:if="${param.logout}"
             class="alert alert-success">

            Sesión cerrada correctamente

        </div>


        <!-- FORM -->
        <form th:action="@{/login}"
              method="post">

            <div class="form-group">

                <label>Email</label>

                <input type="email"
                       name="username"
                       required>

            </div>


            <div class="form-group">

                <label>Contraseña</label>

                <input type="password"
                       name="password"
                       required>

            </div>


            <button type="submit"
                    class="login-btn">

                Iniciar sesión

            </button>

        </form>


        <div class="extra-links">

            <a th:href="@{/}">
                ← Volver al inicio
            </a>

        </div>

    </div>

</div>
<!-- Fondo particles -->
<div id="particles-js"></div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js", {

  particles: {

    number: {
      value: 55,
      density: {
        enable: true,
        value_area: 1000
      }
    },

    color: {
      value: ["#ffffff", "#d9d9d9", "#8a8a8a"]
    },

    shape: {
      type: "circle"
    },

    opacity: {
      value: 0.18,
      random: true,
      anim: {
        enable: true,
        speed: 0.3,
        opacity_min: 0.05,
        sync: false
      }
    },

    size: {
      value: 3,
      random: true,
      anim: {
        enable: true,
        speed: 1,
        size_min: 0.3,
        sync: false
      }
    },

    line_linked: {
      enable: true,
      distance: 160,
      color: "#ffffff",
      opacity: 0.08,
      width: 1
    },

    move: {
      enable: true,
      speed: 0.7,
      direction: "none",
      random: true,
      straight: false,
      out_mode: "out",
      bounce: false
    }

  },

  interactivity: {

    detect_on: "canvas",

    events: {

      onhover: {
        enable: true,
        mode: "grab"
      },

      onclick: {
        enable: false
      },

      resize: true
    },

    modes: {

      grab: {
        distance: 160,

        line_linked: {
          opacity: 0.22
        }

      }

    }

  },

  retina_detect: true

});

</script>
</body>
</html>
