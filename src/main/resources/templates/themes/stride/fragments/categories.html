<section id="categories" th:fragment="categories">
  <div class="container">
    <div class="section-header reveal">
      <h2 class="section-title">Compra Por Categoría</h2>
      <p class="section-sub">Encuentra tu estilo</p>
    </div>
    <div class="categories-grid">
      <div class="cat-card reveal reveal-delay-1">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800&q=80" alt="Categoría Hombre" loading="lazy">
        <div class="cat-overlay"></div>
        <div class="cat-content">
          <h3 class="cat-title">Hombre</h3>
          <div class="cat-line"></div>
        </div>
        <span class="cat-badge">120+ estilos</span>
      </div>
      <div class="cat-card reveal reveal-delay-2">
        <img src="https://images.unsplash.com/photo-1515955656352-a1fa3ffcd111?w=800&q=80" alt="Categoría Mujer" loading="lazy">
        <div class="cat-overlay"></div>
        <div class="cat-content">
          <h3 class="cat-title">Mujer</h3>
          <div class="cat-line"></div>
        </div>
        <span class="cat-badge">95+ estilos</span>
      </div>
      <div class="cat-card reveal reveal-delay-3">
        <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=800&q=80" alt="Categoría Niños" loading="lazy">
        <div class="cat-overlay"></div>
        <div class="cat-content">
          <h3 class="cat-title">Niños</h3>
          <div class="cat-line"></div>
        </div>
        <span class="cat-badge">60+ estilos</span>
      </div>
    </div>
  </div>
</section>
