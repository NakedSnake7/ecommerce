<section th:fragment="checkout">

  	<!-- Modal para el checkout -->
	<div id="checkoutModal" class="modal fade" tabindex="-1" role="dialog">
		<div class="modal-dialog modal-dialog-centered" role="document">
			<div class="modal-content glass-modal">

				<div class="modal-header border-0">
					<h5 class="modal-title">Finalizar Compra</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>

				</div>

				<div class="modal-body">
					<form id="checkoutForm" novalidate>

						<!-- Campo oculto para orderId -->
						<input type="hidden" id="orderId" name="orderId">

						<div class="form-group">
							<label for="fullName">Nombre completo</label> <input type="text"
								class="form-control glass-input" id="fullName" name="fullName"
								placeholder="Tu nombre completo" required>
							<div class="invalid-feedback">Por favor, ingresa tu nombre
								completo.</div>
						</div>

						<div class="form-group">
							<label for="email">Correo electrónico</label> <input type="email"
								class="form-control glass-input" id="email" name="email"
								placeholder="Tu correo electrónico" required>
							<div class="invalid-feedback">Ingresa un correo válido.</div>
						</div>

						<div class="form-group">
							<label for="phone">Teléfono</label> <input type="tel"
								class="form-control glass-input" id="phone" name="phone"
								placeholder="10 dígitos" required pattern="\d{10}">
							<div class="invalid-feedback">Número inválido: deben ser 10
								dígitos.</div>
						</div>

						<div class="form-group">
							<label for="address">Dirección de envío</label>
							<textarea class="form-control glass-input" id="address"
								name="address" rows="3"
								placeholder="Calle, número, colonia, ciudad" required></textarea>
							<div class="invalid-feedback">Ingresa tu dirección
								completa.</div>
						</div>

						<!-- MÉTODO DE PAGO (YA DENTRO DEL FORM) -->
						<div class="form-group mt-3">
							<label><b>Método de pago</b></label>

							<div class="form-check">
								<input class="form-check-input" type="radio"
									name="paymentMethod" id="payTransfer" value="TRANSFER" checked>

								<label class="form-check-label" for="payTransfer">
									Transferencia SPEI </label>
							</div>


							<div class="custom-control custom-radio mt-2 text-muted">
								<input type="radio" id="payStripe" name="paymentMethod"
									class="custom-control-input" value="STRIPE" disabled> <label
									class="custom-control-label" for="payStripe"> Tarjeta
									de crédito / débito <small class="d-block text-warning">
										(No disponible por el momento) </small>
								</label>
							</div>
						</div>


					</form>

					<div class="d-flex justify-content-between mt-3 total-box">
						<span><b>Total:</b></span> <span id="modalTotal"
							class="font-weight-bold text-success fs-5">$0</span>
					</div>

					<p class="small text-success mt-1">✔ Sin costos ocultos</p>				
				</div>


				<div class="modal-footer border-0">
					<div id="checkoutErrors" style="margin-bottom: 12px;"></div>
					<div class="text-center small text-muted mt-2">
						🔒 Compra 100% segura<br> 📦 Envíos a todo México<br> 💬
						Soporte por WhatsApp en todo momento
					</div>
					<button type="button" id="finalizeButton"
						class="btn btn-success btn-block finalize-btn">Finalizar
						Pedido 🚀</button>
				</div>

			</div>
		</div>
	</div>
</section>
