<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/stride.css">

<title th:text="${producto.productName}">Producto</title>

<link rel="stylesheet" href="/assets/css/stride.css">

<style>

.product-detail {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 60px;
  padding: 80px 6%;
}

.product-gallery {
  position: sticky;
  top: 100px;
}

.main-image {
  width: 100%;
  border-radius: 16px;
  transition: transform .4s ease;
}

.main-image:hover {
  transform: scale(1.05);
}

.product-info h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

.category {
  color: #777;
  font-size: 14px;
  margin-bottom: 10px;
}

.price-container {
  margin: 20px 0;
}

.price-old {
  text-decoration: line-through;
  color: #999;
  margin-right: 10px;
}

.price-final {
  font-size: 32px;
  font-weight: bold;
}

.discount-badge {
  background: #111;
  color: #fff;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  margin-left: 10px;
}

.stock {
  margin: 10px 0;
  font-size: 14px;
}

/* 🔥 MICRO UX */
.variant-group button:hover {
  transform: scale(1.05);
}

#btnComprar:disabled {
  background: #999;
  cursor: not-allowed;
}

/* VARIANTES */
.variant-group {
  margin: 25px 0;
}

.variant-group p {
  font-weight: bold;
  margin-bottom: 8px;
}

.variant-group button {
  margin: 5px;
  padding: 10px 16px;
  border-radius: 30px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
  transition: all .2s ease;
}

.variant-group button:hover {
  border-color: black;
}

.variant-group button.active {
  background: black;
  color: white;
}

.variant-group button:disabled {
  opacity: .3;
}

#btnComprar {
  margin-top: 30px;
  padding: 16px;
  width: 100%;
  background: black;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
  transition: .3s;
}

#btnComprar:hover {
  background: #222;
  transform: translateY(-2px);
  
  /* =========================
📱 MOBILE FIRST
========================= */

@media (max-width: 768px) {

  .product-detail {
    grid-template-columns: 1fr;
    gap: 30px;
    padding: 30px 5%;
  }

  .product-gallery {
    position: relative;
    top: 0;
  }

  .main-image {
    border-radius: 12px;
  }

  .product-info h1 {
    font-size: 24px;
  }

  .price-final {
    font-size: 26px;
  }

  .variant-group button {
    padding: 10px 12px;
    font-size: 14px;
  }

  /* 🛒 BOTÓN FIJO */
  #btnComprar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    border-radius: 0;
    z-index: 1000;
  }

  body {
    padding-bottom: 80px; /* evita que el botón tape contenido */
  }

}

@media (min-width: 769px) and (max-width: 1024px) {

  .product-detail {
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    padding: 50px 5%;
  }

  .product-info h1 {
    font-size: 28px;
  }

}


@media (min-width: 1400px) {

  .product-detail {
    max-width: 1300px;
    margin: auto;
  }

}
}
@media (max-width: 768px) {
  .variant-group {
    overflow-x: auto;
    white-space: nowrap;
  }

  .variant-group button {
    display: inline-block;
  }
}
.product-info {
  animation: fadeIn .6s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>
<body>
<!-- ============ NAVBAR ============ -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="product-detail">

  <div class="product-gallery">
    <img id="mainImage"
         class="main-image"
         th:src="${producto.imageUrl != null ? producto.imageUrl : '/img/default.jpg'}">
  </div>

  <div class="product-info">

    <p class="category" th:text="${producto.categoriaNombre}"></p>

    <h1 th:text="${producto.productName}"></h1>

    <!-- 💰 PRECIO -->
    <div class="price-container">

      <span class="price-old"
            th:if="${producto.tienePromocion}"
            th:text="|$${producto.precio}|"></span>

      <span id="price" class="price-final"></span>

      <span class="discount-badge"
            th:if="${producto.tienePromocion}">
        -[[${producto.porcentajeDescuento}]]%
      </span>

      <!-- 💰 AHORRO -->
      <div th:if="${producto.tienePromocion}">
        <p style="color:green; font-size:14px;">
          Ahorras 
          <strong>
            $[[${producto.precio.subtract(producto.precioConDescuento)}]]
          </strong>
        </p>
      </div>

    </div>

    <!-- 📦 STOCK -->
    <p id="stock" class="stock"></p>

    <!-- 🔥 URGENCIA -->
    <p th:if="${producto.stockTotal > 0 && producto.stockTotal <= 5}"
       style="color:#d32f2f; font-weight:bold;">
       🔥 ¡Quedan pocas unidades!
    </p>

    <p th:if="${producto.stockTotal == 0}"
       style="color:#999; font-weight:bold;">
       Producto agotado
    </p>

    <!-- 🔥 VARIANTES -->
    <div id="variantsContainer"></div>

    <!-- 🛒 BOTÓN PRO -->
    <button id="btnComprar">
      🛒 Agregar al carrito
      <span style="display:block; font-size:12px; opacity:.7;">
        Compra ahora antes de que se agote
      </span>
    </button>

    <!-- 🧾 DESCRIPCIÓN -->
    <div style="margin-top:25px;">
      <h3 style="font-size:16px;">Descripción</h3>
      <p th:text="${producto.description}"
         style="color:#555; line-height:1.6;">
      </p>
    </div>

    <!-- 🛡️ CONFIANZA -->
    <div style="margin-top:20px; font-size:14px;">
      <ul style="list-style:none; padding:0;">
        <li>🚚 Envío rápido a todo México</li>
        <li>🔒 Compra 100% segura</li>
        <li>💳 Pagos con tarjeta / transferencia</li>
      </ul>
    </div>

  </div>

</div>

<script th:inline="javascript">
const variantes = /*[[${producto.variantes}]]*/ [];
const tienePromo = /*[[${producto.tienePromocion}]]*/ false;
const descuento = /*[[${producto.porcentajeDescuento}]]*/ 0;
const precioBase = /*[[${producto.precioConDescuento}]]*/ 0;
</script>

<script>
// ============ NAVBAR SCROLL ============
const Navbar = {
  el: document.getElementById('navbar'),
  init() {
    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        this.el.classList.add('scrolled');
      } else {
        this.el.classList.remove('scrolled');
      }
    }, { passive: true });
  }
};

// ============ SCROLL INDICATOR ============
const ScrollIndicator = {
  el: document.getElementById('scroll-indicator'),
  init() {
    window.addEventListener('scroll', () => {
      if (window.scrollY > 80) {
        this.el.classList.add('hidden');
      } else {
        this.el.classList.remove('hidden');
      }
    }, { passive: true });
  }
};

// ============ MOBILE MENU ============
const MobileMenu = {
  btn: document.getElementById('hamburger'),
  menu: document.getElementById('mobile-menu'),
  open: false,
  init() {
    this.btn.addEventListener('click', () => {
      this.open = !this.open;
      this.menu.classList.toggle('open', this.open);
      this.btn.classList.toggle('open', this.open);
    });
    // Close on link click
    this.menu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        this.open = false;
        this.menu.classList.remove('open');
        this.btn.classList.remove('open');
      });
    });
  }
};

// ============ CART ============
const Cart = {
  count: 0,
  badge: document.getElementById('cart-badge'),
  add(btn) {
    if (btn.disabled) return;
    // Button state change
    const original = btn.textContent;
    btn.textContent = '✓ Añadido';
    btn.classList.add('added');
    btn.disabled = true;
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('added');
      btn.disabled = false;
    }, 900);
    // Increment
    this.count++;
    this.updateBadge();
    this.animateBadge();
  },
  updateBadge() {
    this.badge.textContent = this.count;
  },
  animateBadge() {
    this.badge.classList.remove('pop');
    void this.badge.offsetWidth; // reflow
    this.badge.classList.add('pop');
  }
};

// ============ COUNTDOWN ============
const Countdown = {
  hours: document.getElementById('cd-hours'),
  mins: document.getElementById('cd-mins'),
  secs: document.getElementById('cd-secs'),
  end: null,
  init() {
    const key = 'strideCountdownEnd';
    const stored = localStorage.getItem(key);
    const now = Date.now();
    if (stored && parseInt(stored) > now) {
      this.end = parseInt(stored);
    } else {
      this.end = now + 72 * 60 * 60 * 1000;
      localStorage.setItem(key, this.end);
    }
    this.tick();
    setInterval(() => this.tick(), 1000);
  },
  tick() {
    const diff = this.end - Date.now();
    if (diff <= 0) {
      // Reinicia 24h
      this.end = Date.now() + 24 * 60 * 60 * 1000;
      localStorage.setItem('strideCountdownEnd', this.end);
      return;
    }
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    this.hours.textContent = String(h).padStart(2, '0');
    this.mins.textContent = String(m).padStart(2, '0');
    this.secs.textContent = String(s).padStart(2, '0');
  }
};

// ============ SCROLL REVEAL ============
const ScrollReveal = {
  init() {
    const els = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    els.forEach(el => observer.observe(el));
  }
};

// ============ NEWSLETTER ============
const Newsletter = {
  input: document.getElementById('newsletter-input'),
  form: document.getElementById('newsletter-form'),
  error: document.getElementById('newsletter-error'),
  success: document.getElementById('newsletter-success'),
  wrap: document.getElementById('newsletter-form-wrap'),
  validate(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  },
  submit() {
    const val = this.input.value.trim();
    if (!this.validate(val)) {
      this.form.classList.add('error');
      this.error.classList.add('show');
      this.input.focus();
      return;
    }
    this.form.classList.remove('error');
    this.error.classList.remove('show');
    this.wrap.style.display = 'none';
    this.success.style.display = 'block';
  },
  init() {
    this.input.addEventListener('input', () => {
      this.form.classList.remove('error');
      this.error.classList.remove('show');
    });
    this.input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') this.submit();
    });
  }
};

// ============ INIT ALL ============
document.addEventListener('DOMContentLoaded', () => {
  Navbar.init();
  ScrollIndicator.init();
  MobileMenu.init();
  Countdown.init();
  ScrollReveal.init();
  Newsletter.init();
});
</script>
<script>

const priceEl = document.getElementById("price");
const stockEl = document.getElementById("stock");
const container = document.getElementById("variantsContainer");
const btnComprar = document.getElementById("btnComprar");

let selected = {};

// 🔥 PRECIO INICIAL
priceEl.innerText = `$${precioBase}`;

// 🔥 NORMALIZAR
const variantesNormalizadas = variantes.map(v => ({
    id: v.id,
    precio: v.precio,
    stock: v.stock,
    atributos: v.atributos
}));

const atributosDisponibles = {};

variantesNormalizadas.forEach(v => {
    Object.entries(v.atributos).forEach(([k, val]) => {
        if (!atributosDisponibles[k]) atributosDisponibles[k] = new Set();
        atributosDisponibles[k].add(val);
    });
});

function renderVariants() {

    Object.entries(atributosDisponibles).forEach(([nombre, valores]) => {

        const group = document.createElement("div");
        group.classList.add("variant-group");

        const title = document.createElement("p");
        title.innerText = nombre;

        group.appendChild(title);

        valores.forEach(valor => {

            const btn = document.createElement("button");
            btn.innerText = valor;

            btn.onclick = () => {
                selected[nombre] = valor;
                updateUI();
                updateActive();
            };

            btn.dataset.attr = nombre;
            btn.dataset.value = valor;

            group.appendChild(btn);
        });

        container.appendChild(group);
    });
}

function findVariant() {
    return variantesNormalizadas.find(v =>
        Object.entries(selected).every(([k,vv]) => v.atributos[k] === vv)
    );
}

function updateUI() {

    const v = findVariant();

    if (!v) {
        stockEl.innerText = "Selecciona una opción";
        btnComprar.disabled = true;
        return;
    }

    let precio = v.precio;

    if (tienePromo && descuento > 0) {
        precio = precio - (precio * (descuento / 100));
    }

    priceEl.innerText = `$${precio.toFixed(2)}`;

    if (v.stock > 0) {
        stockEl.innerText = `Disponible (${v.stock})`;
        btnComprar.disabled = false;
    } else {
        stockEl.innerText = "Agotado";
        btnComprar.disabled = true;
    }
}

function updateActive() {
    document.querySelectorAll(".variant-group button").forEach(btn => {
        const a = btn.dataset.attr;
        const v = btn.dataset.value;
        btn.classList.toggle("active", selected[a] === v);
    });
}

document.addEventListener("DOMContentLoaded", () => {

    renderVariants();

    if (variantesNormalizadas.length > 0) {
        selected = {...variantesNormalizadas[0].atributos};
    }

    updateUI();
    updateActive();
});

</script>

</body>
</html>
