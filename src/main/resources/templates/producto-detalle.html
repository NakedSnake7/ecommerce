<!DOCTYPE html>
<html lang="es"
xmlns:th="http://www.thymeleaf.org"
th:replace="~{layout/main :: layout(${producto.productName}, ~{::section})}">

<section>

<style>
:root{
--bg:#ffffff;
--text:#111;
--muted:#777;
--line:#ececec;
--brand:#000;
--soft:#f7f7f7;
--radius:18px
}
.product-wrap{max-width:1450px;margin:auto;padding:40px 5%}
.breadcrumbs{font-size:13px;color:var(--muted);margin-bottom:20px}
.product-detail{display:grid;grid-template-columns:100px 1fr 1fr;gap:28px}
.thumbs{display:flex;flex-direction:column;gap:10px}
.thumb{
width:88px;height:88px;object-fit:cover;
border:1px solid var(--line);
border-radius:16px;cursor:pointer
}
.thumb.active{border-color:#000}
.gallery-box{
background:var(--soft);
border-radius:24px;
overflow:hidden;
position:sticky;
top:100px
}
.sticky-buy{
position:fixed;
left:0;
right:0;
bottom:0;
background:#fff;
border-top:1px solid var(--line);
padding:10px 4%;
display:none;
gap:10px;
z-index:999;
}

@media(max-width:900px){
.sticky-buy{display:flex}
.product-wrap{padding-bottom:90px}
}

.main-image{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
transition:.3s
}
.gallery-box:hover .main-image{transform:scale(1.08)}
.badges{display:flex;gap:8px;margin-bottom:12px}
.badge{
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:700
}
.hot{background:#111;color:#fff}
.sale{background:#eaf8ec;color:#0b8a35}
.product-info h1{
font-size:42px;
line-height:1.05;
margin:8px 0 18px
}
.price-final{font-size:38px;font-weight:800}
.price-old{text-decoration:line-through;color:#999;margin-right:10px}
.variant-group{margin:24px 0}
.variant-group p{font-weight:700;margin-bottom:10px}
.variant-options{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px
}
.variant-options button{
border:1px solid var(--line);
background:#fff;
padding:14px 10px;
border-radius:8px;
cursor:pointer;
font-weight:700;
min-height:60px
}
.variant-options button.active{
background:#111;
color:#fff
}
.variant-options button.out{
opacity:.5;
cursor:not-allowed
}
.qty-row{display:flex;gap:12px;align-items:center;margin:18px 0}
.qty{
display:flex;
border:1px solid var(--line);
border-radius:14px;
overflow:hidden
}
.qty button,.qty input{
border:none;
background:#fff;
height:46px
}
.qty button{width:46px;cursor:pointer}
.qty input{width:52px;text-align:center}
.cta-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px
}
.btn{
padding:16px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer
}
.btn-main{background:#000;color:#fff}
.btn-wa{background:#25D366;color:#fff}
.tabs{
margin-top:28px;
border:1px solid var(--line);
border-radius:20px;
overflow:hidden
}
.tab-head{
display:grid;
grid-template-columns:repeat(3,1fr)
}
.tab-head button{
padding:14px;
border:none;
background:#fff;
cursor:pointer
}
.tab-head button.active{
background:#111;
color:#fff
}
.tab-body{padding:22px}
@media(max-width:900px){
.product-detail{grid-template-columns:1fr}
.thumbs{order:2;flex-direction:row;overflow:auto}
.gallery-box{position:relative;top:0}
.product-info h1{font-size:30px}
.cta-grid{grid-template-columns:1fr}
}
</style>

<div class="product-wrap">

<div class="breadcrumbs">
Inicio /
<span th:text="${producto.categoriaNombre}"></span> /
<span th:text="${producto.productName}"></span>
</div>

<div class="product-detail">

<!-- MINIATURAS -->
<div class="thumbs">

<img class="thumb active"
     th:src="${producto.imageUrl}">

<img class="thumb"
     th:each="img : ${producto.imagenes}"
     th:src="${img}">
</div>

<!-- IMAGEN -->
<div class="gallery-box">
<img id="mainImage"
     class="main-image"
     th:src="${producto.imageUrl}">
</div>

<!-- INFO -->
<div class="product-info">

<div class="badges">
<span class="badge hot">TOP</span>

<span class="badge sale"
      th:if="${producto.tienePromocion}">
OFERTA
</span>
</div>

<h1 th:text="${producto.productName}"></h1>

<!-- PRECIO -->
<div>

<span class="price-old"
      th:if="${producto.tienePromocion}">
$<span th:text="${#numbers.formatDecimal(producto.precio,1,2)}"></span>
</span>

<span class="price-final">
$<span th:text="${#numbers.formatDecimal(producto.precioConDescuento != null ? producto.precioConDescuento : producto.precio,1,2)}"></span>
</span>

</div>

<!-- STOCK SIMPLE -->
<p th:if="${!producto.tieneVariantes}">
Stock disponible:
<strong th:text="${producto.stockSimple}"></strong>
</p>

<!-- VARIANTES -->
<div class="variant-group"
     th:if="${producto.tieneVariantes}">

<p>Opciones disponibles</p>

<div id="variantsContainer"
     class="variant-options">
</div>

<div id="sizeUrgency" style="margin-top:14px;font-weight:700"></div>

<div style="height:6px;background:#eee;border-radius:999px;margin-top:10px;overflow:hidden">
    <div id="stockBar" style="height:100%;width:60%;background:#111"></div>
</div>
</div>

<!-- CANTIDAD -->
<div class="qty-row">

<strong>Cantidad</strong>

<div class="qty">
<button onclick="chg(-1)">-</button>
<input id="qty" value="1">
<button onclick="chg(1)">+</button>
</div>

</div>

<!-- BOTONES -->
<div class="cta-grid">

<button id="btnComprar"
        class="btn btn-main">
Agregar al carrito
</button>

<button id="btnWhatsapp"
        class="btn btn-wa">
WhatsApp
</button>

</div>

<!-- TABS -->
<div class="tabs">

<div class="tab-head">
<button class="active"
onclick="tab(0,this)">
Descripción
</button>

<button onclick="tab(1,this)">
Envíos
</button>

<button onclick="tab(2,this)">
Cambios
</button>
</div>

<div class="tab-body"
     id="tabBody"
     th:data-desc="${producto.description}"
     th:text="${producto.description}">
</div>

</div>

</div>
</div>
</div>

<script th:inline="javascript">
const variantes = /*[[${producto.variantes}]]*/ [];
const productoId = /*[[${producto.id}]]*/ 0;
const productoNombre = /*[[${producto.productName}]]*/ '';

const precioBase = /*[[${producto.precio != null ? producto.precio : 0}]]*/ 0;
const precioDescuento = /*[[${producto.precioConDescuento != null ? producto.precioConDescuento : producto.precio}]]*/ 0;
</script>
<script>
const priceEl = document.getElementById('price');

/* =========================
   THUMBS
========================= */
document.querySelectorAll('.thumb').forEach(t=>{
t.onclick=()=>{
document.getElementById('mainImage').src=t.src;
document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('active'));
t.classList.add('active');
};
});

/* =========================
   MONEY FORMAT
========================= */
function money(n){
return '$'+Number(n || 0).toFixed(2);
}

/* =========================
   QTY
========================= */
function chg(n){
let q=document.getElementById('qty');
q.value=Math.max(1,(+q.value||1)+n);
}

/* =========================
   TABS
========================= */
function tab(i,el){
document.querySelectorAll('.tab-head button')
.forEach(b=>b.classList.remove('active'));

el.classList.add('active');

const body=document.getElementById('tabBody');
const desc=body.dataset.desc || '';

const arr=[
desc,
'Envíos nacionales de 2 a 5 días hábiles.',
'Cambios por defecto de fábrica.'
];

body.innerHTML=arr[i];
}

/* =========================
   LABEL VARIANTE
========================= */
function getLabel(v){
const a=v.atributos || {};
return a.Talla || a.talla || a.Color || a.color || v.nombre || 'Variante';
}

/* =========================
   RENDER VARIANTES
========================= */
function renderVariantes(){

	const c = document.getElementById('variantsContainer');
	if(!c || !variantes.length) return;

	c.innerHTML = '';

	variantes.forEach(v => {

	const stock = Number(v.stock || 0);
	const precio = Number(v.precio || precioBase);

	const b = document.createElement('button');

	b.innerHTML =
	    getLabel(v) +
	    '<br><small>' + (stock > 0 ? stock + ' pzs' : 'Agotado') + '</small>';

	if(stock <= 0){
	    b.classList.add('out');
	    b.disabled = true;
	    c.appendChild(b);
	    return;
	}

	b.onclick = () => {

	    document.querySelectorAll('#variantsContainer button')
	        .forEach(x => x.classList.remove('active'));

	    b.classList.add('active');

	    /* PRECIO */
	    priceEl.innerHTML = money(precio);

	    /* URGENCIA STOCK (🔥 NUEVO) */
	    const u = document.getElementById('sizeUrgency');
	    const bar = document.getElementById('stockBar');

	    if(stock <= 2){
	        u.textContent = '🔴 ' + stock + ' disponibles - ¡Casi agotado!';
	        bar.style.width = '10%';
	    } 
	    else if(stock <= 5){
	        u.textContent = '🟠 ' + stock + ' disponibles';
	        bar.style.width = '30%';
	    } 
	    else {
	        u.textContent = '🟢 ' + stock + ' disponibles';
	        bar.style.width = '70%';
	    }
	};

	c.appendChild(b);

	});

	/* auto-select */
	const first = c.querySelector('button:not(.out)');
	if(first) first.click();

	}

/* =========================
   CART
========================= */
async function addCart(){

await fetch('/carrito/agregar',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
productoId:productoId,
cantidad:+document.getElementById('qty').value
})
});

alert('Agregado al carrito');
}

/* =========================
   WHATSAPP
========================= */
function wa(){
window.open(
'https://wa.me/5210000000000?text='+
encodeURIComponent('Hola quiero comprar '+productoNombre),
'_blank'
);
}

/* =========================
   INIT
========================= */
document.getElementById('btnComprar').onclick=addCart;
document.getElementById('btnWhatsapp').onclick=wa;

renderVariantes();
</script>
<div id="sizeUrgency" style="margin-top:14px;font-weight:700"></div>

<div style="height:6px;background:#eee;border-radius:999px;margin-top:10px;overflow:hidden">
    <div id="stockBar" style="height:100%;width:60%;background:#111"></div>
</div>
</section>
</html>
