<!DOCTYPE html>
<html lang="es"
xmlns:th="http://www.thymeleaf.org"
th:replace="~{layout/main :: layout(${producto.productName}, ~{::section})}">
<section>
<style>
:root{--bg:#ffffff;--text:#111;--muted:#777;--line:#ececec;--brand:#000;--soft:#f7f7f7;--radius:18px}
.product-wrap{max-width:1450px;margin:auto;padding:40px 5%}
.breadcrumbs{font-size:13px;color:var(--muted);margin-bottom:20px}
.product-detail{display:grid;grid-template-columns:100px 1fr 1fr;gap:28px}
.thumbs{display:flex;flex-direction:column;gap:10px}.thumb{width:88px;height:88px;object-fit:cover;border:1px solid var(--line);border-radius:16px;cursor:pointer}.thumb.active{border-color:#000}
.gallery-box{background:var(--soft);border-radius:24px;overflow:hidden;position:sticky;top:100px}.main-image{width:100%;aspect-ratio:1/1;object-fit:cover;transition:.3s}.gallery-box:hover .main-image{transform:scale(1.12)}
.badges{display:flex;gap:8px;margin-bottom:12px}.badge{padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}.hot{background:#111;color:#fff}.sale{background:#eaf8ec;color:#0b8a35}
.product-info h1{font-size:42px;line-height:1.05;margin:8px 0 18px}.price-final{font-size:38px;font-weight:800}.price-old{text-decoration:line-through;color:#999;margin-right:10px}.stars{color:#f5a623;font-size:14px;margin:10px 0}
.progress{height:10px;background:#eee;border-radius:999px;overflow:hidden;margin:14px 0}.progress>span{display:block;height:100%;width:78%;background:#111}
.variant-group{margin:24px 0}.variant-group p{font-weight:700;margin-bottom:10px}.variant-options{display:flex;gap:10px;flex-wrap:wrap}.variant-options button{border:1px solid var(--line);background:#fff;padding:14px 10px;border-radius:4px;cursor:pointer;font-weight:700;min-height:52px;position:relative}.variant-options button.out{color:#999;background:#f3f3f3}.variant-options button.out:after{content:'';position:absolute;left:0;top:0;right:0;bottom:0;background:linear-gradient(to top right,transparent 48%,#bdbdbd 49%,#bdbdbd 51%,transparent 52%)}.variant-options button.active{background:#111;color:#fff}
.qty-row{display:flex;gap:12px;align-items:center;margin:18px 0}.qty{display:flex;border:1px solid var(--line);border-radius:14px;overflow:hidden}.qty button,.qty input{border:none;background:#fff;height:46px}.qty button{width:46px;cursor:pointer}.qty input{width:52px;text-align:center}
.cta-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.btn{padding:16px;border:none;border-radius:14px;font-weight:800;cursor:pointer}.btn-main{background:#000;color:#fff}.btn-wa{background:#25D366;color:#fff}
.tabs{margin-top:28px;border:1px solid var(--line);border-radius:20px;overflow:hidden}.tab-head{display:grid;grid-template-columns:repeat(3,1fr)}.tab-head button{padding:14px;border:none;background:#fff;border-bottom:1px solid var(--line);cursor:pointer}.tab-head button.active{background:#111;color:#fff}.tab-body{padding:22px}
.sticky-buy{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 4%;display:none;gap:10px;z-index:999}
@media(max-width:900px){.product-detail{grid-template-columns:1fr}.thumbs{order:2;flex-direction:row;overflow:auto}.gallery-box{position:relative;top:0}.product-info h1{font-size:30px}.cta-grid{grid-template-columns:1fr}.sticky-buy{display:flex}.product-wrap{padding-bottom:90px}}
</style>
<div class='product-wrap'>
<div class='breadcrumbs'>Inicio / Tenis / <span th:text='${producto.productName}'></span></div>
<div class='product-detail'>
<div class='thumbs'>
<img class='thumb active' th:src='${producto.imageUrl}'>
<img class='thumb' th:each='img:${producto.urlsImagenesExistentes}' th:src='${img}'>
</div>
<div class='gallery-box'><img id='mainImage' class='main-image' th:src='${producto.imageUrl}'></div>
<div class='product-info'>
<div class='badges'><span class='badge hot'>STRIDE HOT</span><span class='badge sale' th:if='${producto.tienePromocion}'>OFERTA</span></div>
<h1 th:text='${producto.productName}'></h1>
<div class='stars'>★★★★★ <span style='color:#777'>(124 reseñas)</span></div>
<div><span class='price-old' th:if='${producto.tienePromocion}'>$<span th:text='${producto.price}'></span></span><span id='price' class='price-final'></span></div>
<div class='progress'><span></span></div><small>78% vendido esta semana</small>
<p id='stock'></p>
<div class='variant-group'><p>Opciones disponibles</p><div id='variantsContainer' th:if='${producto.tieneVariantes}' class='variant-options' style='display:grid;grid-template-columns:repeat(4,1fr);gap:10px'></div><div id='sizeUrgency' style='margin-top:14px;color:#e53935;font-weight:700'></div><div style='height:6px;background:#eee;border-radius:999px;margin-top:10px;overflow:hidden'><div id='stockBar' style='height:100%;width:20%;background:#111'></div></div></div>
<div class='qty-row'><strong>Cantidad</strong><div class='qty'><button onclick='chg(-1)'>-</button><input id='qty' value='1'><button onclick='chg(1)'>+</button></div></div>
<div class='cta-grid'><button id='btnComprar' class='btn btn-main'>Agregar al carrito</button><button id='btnWhatsapp' class='btn btn-wa'>WhatsApp</button></div>
<div class='info-box' style='margin-top:24px;border:1px solid #ececec;border-radius:20px;padding:22px'>
<h3 style='margin-top:0'>Guía de Tallas STRIDE</h3>
<table style='width:100%;border-collapse:collapse;font-size:14px'>
<tr style='background:#f7f7f7'><th style='padding:10px;text-align:left'>MX</th><th style='padding:10px;text-align:left'>US</th><th style='padding:10px;text-align:left'>CM</th></tr>
<tr><td style='padding:10px;border-top:1px solid #eee'>25</td><td style='padding:10px;border-top:1px solid #eee'>7</td><td style='padding:10px;border-top:1px solid #eee'>25 cm</td></tr>
<tr><td style='padding:10px;border-top:1px solid #eee'>26</td><td style='padding:10px;border-top:1px solid #eee'>8</td><td style='padding:10px;border-top:1px solid #eee'>26 cm</td></tr>
<tr><td style='padding:10px;border-top:1px solid #eee'>27</td><td style='padding:10px;border-top:1px solid #eee'>9</td><td style='padding:10px;border-top:1px solid #eee'>27 cm</td></tr>
<tr><td style='padding:10px;border-top:1px solid #eee'>28</td><td style='padding:10px;border-top:1px solid #eee'>10</td><td style='padding:10px;border-top:1px solid #eee'>28 cm</td></tr>
<tr><td style='padding:10px;border-top:1px solid #eee'>29</td><td style='padding:10px;border-top:1px solid #eee'>11</td><td style='padding:10px;border-top:1px solid #eee'>29 cm</td></tr>
</table>
<small style='color:#777'>Tip: si estás entre dos tallas, elige la mayor.</small>
</div>
<div class='tabs'><div class='tab-head'><button class='active' onclick='tab(0,this)'>Descripción</button><button onclick='tab(1,this)'>Envíos</button><button onclick='tab(2,this)'>Cambios</button></div><div class='tab-body' id='tabBody' th:text='${producto.description}'></div></div>
</div></div></div>
<div class='sticky-buy'><button class='btn btn-main' style='flex:1' onclick='addCart()'>Comprar ahora</button><button class='btn btn-wa' onclick='wa()'>WA</button></div>
<script th:inline='javascript'>const variantes=/*[[${producto.variantes}]]*/[];const precioBase=/*[[${producto.precioFinal}]]*/0;const tienePromo=/*[[${producto.tienePromocion}]]*/false;const descuento=/*[[${producto.porcentajeDescuento}]]*/0;const productoId=/*[[${producto.id}]]*/0;const productoNombre=/*[[${producto.productName}]]*/'';</script>
<script>
const money=n=>'$'+Number(n).toFixed(2);const priceEl=document.getElementById('price');const stockEl=document.getElementById('stock');priceEl.textContent=money(precioBase);
document.querySelectorAll('.thumb').forEach(t=>t.onclick=()=>{mainImage.src=t.src;document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('active'));t.classList.add('active')});
function chg(n){let q=document.getElementById('qty');q.value=Math.max(1,(+q.value||1)+n)}
function tab(i,el){document.querySelectorAll('.tab-head button').forEach(b=>b.classList.remove('active'));el.classList.add('active');const arr=[''+document.getElementById('tabBody').dataset.desc,'Envíos 2 a 5 días hábiles en México.','30 días para cambios por defecto de fábrica.'];document.getElementById('tabBody').innerHTML=arr[i]||document.getElementById('tabBody').innerHTML}
async function addCart(){await fetch('/carrito/agregar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productoId:productoId,cantidad:+document.getElementById('qty').value})});alert('Agregado al carrito')}
function wa(){window.open('https://wa.me/5210000000000?text='+encodeURIComponent('Hola quiero comprar '+productoNombre),'_blank')}
function renderSizes(){const c=document.getElementById('variantsContainer');if(!c||!variantes.length)return;c.innerHTML='';variantes.forEach(v=>{const b=document.createElement('button');b.textContent=(v.atributos.Talla||v.atributos.talla||v.atributos.SIZE||v.atributos.size||'N/A');if(+v.stock<=0){b.classList.add('out');b.disabled=true}else{b.onclick=()=>{document.querySelectorAll('#variantsContainer button').forEach(x=>x.classList.remove('active'));b.classList.add('active');priceEl.textContent=money(v.precio);const u=document.getElementById('sizeUrgency');const bar=document.getElementById('stockBar');if(+v.stock<=2){u.textContent='🔴 '+v.stock+' disponibles - ¡Casi agotado!';bar.style.width='8%'}else if(+v.stock<=5){u.textContent='🟠 Quedan pocas piezas';bar.style.width='25%'}else{u.textContent='🟢 Disponible';bar.style.width='65%'}}}c.appendChild(b)});}function getLabel(v){const a=v.atributos||{};return a.Talla||a.talla||a.numero||a.Numero||a.size||a.SIZE||a.medida||a.numeracion||a.color||a.Color||v.nombre||'Variante'}
function renderSizes(){const c=document.getElementById('variantsContainer');if(!c||!variantes.length)return;c.innerHTML='';variantes.forEach(v=>{const talla=getLabel(v);const stock=Number(v.stock||0);const precio=Number(v.precio||precioBase);const b=document.createElement('button');b.innerHTML=talla+'<br><small style="font-weight:600">'+(stock>0?stock+' pzs':'Agotado')+'</small>';if(stock<=0){b.classList.add('out');b.disabled=true}else{b.onclick=()=>{document.querySelectorAll('#variantsContainer button').forEach(x=>x.classList.remove('active'));b.classList.add('active');priceEl.textContent=money(precio);const u=document.getElementById('sizeUrgency');const bar=document.getElementById('stockBar');if(stock<=2){u.textContent='🔴 '+stock+' disponibles - ¡Casi agotado!';bar.style.width='10%'}else if(stock<=5){u.textContent='🟠 '+stock+' disponibles';bar.style.width='30%'}else{u.textContent='🟢 '+stock+' disponibles';bar.style.width='70%'}}}c.appendChild(b)});const first=c.querySelector('button:not(.out)');if(first)first.click()}
renderSizes();document.getElementById('btnComprar').onclick=addCart;document.getElementById('btnWhatsapp').onclick=wa;
</script>
</section></html>
