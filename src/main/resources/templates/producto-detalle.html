<!DOCTYPE html>
<html lang="es"
xmlns:th="http://www.thymeleaf.org"
th:replace="~{layout/main :: layout(
    ${producto.productName},
    ~{::section}
)}">

<section>

<style>
/* ========= ORIGINAL DARK PREMIUM ========= */

.product-wrap{
  max-width:1400px;
  margin:auto;
  padding:60px 5%;
}

.product-detail{
  display:grid;
  grid-template-columns:1.08fr 1fr;
  gap:70px;
}

/* ===== GALERIA ===== */

.product-gallery{
  position:sticky;
  top:110px;
}

.gallery-box{
  background:#111;
  border-radius:22px;
  overflow:hidden;
}

.main-image{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  cursor:zoom-in;
  transition:transform .25s ease;
}

.main-image.zoom{
  transform:scale(1.65);
  cursor:zoom-out;
}

.thumbs{
  display:flex;
  gap:10px;
  margin-top:14px;
  overflow:auto;
}

.thumb{
  width:72px;
  height:72px;
  border-radius:14px;
  object-fit:cover;
  cursor:pointer;
  border:2px solid transparent;
  transition:.2s;
}

.thumb.active{
  border-color:#000;
}

/* ===== INFO ===== */

.category{
  color:#777;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:1px;
}

.product-info h1{
  font-size:40px;
  line-height:1.05;
  margin:10px 0 20px;
  color:#111;
}

.price-row{
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.price-old{
  text-decoration:line-through;
  color:#999;
  font-size:18px;
}

.price-final{
  font-size:38px;
  font-weight:800;
  color:#111;
}

.discount-badge{
  background:#111;
  color:#fff;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
}

.stock{
  margin:18px 0;
  font-size:14px;
  font-weight:600;
}

.stock.ok{color:#0c8a38;}
.stock.low{color:#d32f2f;}

.urgency{
  background:#fff4f4;
  color:#d32f2f;
  padding:10px 14px;
  border-radius:12px;
  font-size:13px;
  font-weight:700;
  margin:15px 0;
}

/* ===== VARIANTES ===== */

.variant-group{
  margin:26px 0;
}

.variant-group p{
  font-weight:700;
  margin-bottom:10px;
}

.variant-options{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.variant-options button{
  padding:11px 16px;
  border-radius:999px;
  border:1px solid #ddd;
  background:#fff;
  cursor:pointer;
  transition:.2s;
}

.variant-options button:hover{
  border-color:#000;
}

.variant-options button.active{
  background:#000;
  color:#fff;
}

.variant-options button:disabled{
  opacity:.35;
  cursor:not-allowed;
}

/* ===== CTA ===== */

.cta-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:28px;
}

.btn-main,
.btn-wa{
  border:none;
  padding:16px;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
}

.btn-main{
  background:#000;
  color:#fff;
}

.btn-main:hover{
  background:#1a1a1a;
}

.btn-wa{
  background:#25D366;
  color:#fff;
}

.btn-wa:hover{
  filter:brightness(.95);
}

/* ===== INFO CARDS ===== */

.info-box{
  margin-top:26px;
  padding:22px;
  border:1px solid #eee;
  border-radius:18px;
}

.info-box h3{
  margin-bottom:10px;
}

.info-box p{
  color:#555;
  line-height:1.7;
}

.info-box ul{
  list-style:none;
  padding:0;
  margin:0;
  display:grid;
  gap:10px;
}

/* ===== MOBILE STICKY ===== */

.mobile-bar{
  display:none;
}

@media(max-width:768px){

  .product-wrap{
    padding:25px 4%;
  }

  .product-detail{
    grid-template-columns:1fr;
    gap:30px;
  }

  .product-gallery{
    position:relative;
    top:0;
  }

  .product-info h1{
    font-size:28px;
  }

  .price-final{
    font-size:30px;
  }

  .variant-options{
    flex-wrap:nowrap;
    overflow:auto;
    padding-bottom:6px;
  }

  .cta-grid{
    grid-template-columns:1fr;
  }

  .mobile-bar{
    display:flex;
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    background:#fff;
    padding:10px;
    gap:10px;
    z-index:999;
    box-shadow:0 -8px 20px rgba(0,0,0,.08);
  }

  .mobile-bar button{
    flex:1;
    border:none;
    padding:14px;
    border-radius:12px;
    font-weight:700;
  }

  .mobile-cart{
    background:#000;
    color:#fff;
  }

  .mobile-wa{
    background:#25D366;
    color:#fff;
  }

  body{
    padding-bottom:90px;
  }

}
</style>

<div class="product-wrap">

<div class="product-detail">

<!-- ===== GALERIA ===== -->
<div class="product-gallery">

  <div class="gallery-box">
    <img id="mainImage"
         class="main-image"
         th:src="${producto.imageUrl}"
         th:alt="${producto.productName}">
  </div>

  <div class="thumbs">

    <img class="thumb active"
         th:src="${producto.imageUrl}">

    <img class="thumb"
         th:each="img : ${producto.urlsImagenesExistentes}"
         th:src="${img}">
  </div>

</div>

<!-- ===== INFO ===== -->
<div class="product-info">

<p class="category" th:text="${producto.categoriaNombre}"></p>

<h1 th:text="${producto.productName}"></h1>

<div class="price-row">

<span class="price-old"
      th:if="${producto.tienePromocion}"
      th:text="|$${producto.precio}|"></span>

<span class="price-final" id="price"></span>

<span class="discount-badge"
      th:if="${producto.tienePromocion}">
  -[[${producto.porcentajeDescuento}]]%
</span>

</div>

<p id="stock" class="stock"></p>

<div id="urgencyBox" class="urgency"></div>

<!-- VARIANTES -->
<div id="variantsContainer"></div>

<!-- CTA -->
<div class="cta-grid">

<button id="btnComprar" class="btn-main">
🛒 Agregar al carrito
</button>

<button id="btnWhatsapp" class="btn-wa">
Comprar por WhatsApp
</button>

</div>

<!-- DESC -->
<div class="info-box">
<h3>Descripción</h3>
<p th:text="${producto.description}"></p>
</div>

<!-- TRUST -->
<div class="info-box">
<ul>
<li>🚚 Envíos rápidos a todo México</li>
<li>🔒 Compra segura</li>
<li>💳 Tarjeta / Transferencia</li>
<li>↩️ Garantía de satisfacción</li>
</ul>
</div>

</div>
</div>
</div>

<!-- MOBILE BAR -->
<div class="mobile-bar">
<button class="mobile-cart" id="mobileCart">Agregar</button>
<button class="mobile-wa" id="mobileWa">WhatsApp</button>
</div>

<script th:inline="javascript">
const variantes = /*[[${producto.variantes}]]*/ [];
const precioBase = /*[[${producto.precioConDescuento}]]*/ 0;
const descuento = /*[[${producto.porcentajeDescuento}]]*/ 0;
const tienePromo = /*[[${producto.tienePromocion}]]*/ false;
const productoNombre = /*[[${producto.productName}]]*/ '';
</script>

<script>
const priceEl = document.getElementById("price");
const stockEl = document.getElementById("stock");
const urgencyBox = document.getElementById("urgencyBox");
const container = document.getElementById("variantsContainer");

let selected = {};

const money = n => "$" + Number(n).toFixed(2);

priceEl.textContent = money(precioBase);

/* ===== ZOOM ===== */
const mainImage = document.getElementById("mainImage");

mainImage.onclick = ()=>{
  mainImage.classList.toggle("zoom");
};

/* ===== GALLERY ===== */
document.querySelectorAll(".thumb").forEach(t=>{
  t.onclick = ()=>{
    mainImage.src = t.src;

    document.querySelectorAll(".thumb")
      .forEach(x=>x.classList.remove("active"));

    t.classList.add("active");
  };
});

/* ===== VARIANTES ===== */

const vars = variantes.map(v=>({
  id:v.id,
  precio:Number(v.precio),
  stock:Number(v.stock),
  atributos:v.atributos
}));

const attrs = {};

vars.forEach(v=>{
  Object.entries(v.atributos).forEach(([k,val])=>{
    if(!attrs[k]) attrs[k] = new Set();
    attrs[k].add(val);
  });
});

function renderVariants(){

container.innerHTML="";

Object.entries(attrs).forEach(([name,vals])=>{

 const g = document.createElement("div");
 g.className="variant-group";

 g.innerHTML=`<p>${name}</p>`;

 const wrap = document.createElement("div");
 wrap.className="variant-options";

 vals.forEach(v=>{

   const b = document.createElement("button");
   b.textContent=v;

   b.onclick=()=>{
     selected[name]=v;
     updateUI();
     updateActive();
   };

   b.dataset.attr=name;
   b.dataset.value=v;

   wrap.appendChild(b);
 });

 g.appendChild(wrap);
 container.appendChild(g);

});

}

function findVariant(){
 return vars.find(v =>
   Object.entries(selected)
   .every(([k,val]) => v.atributos[k]===val)
 );
}

function updateUI(){

 const v = findVariant();

 if(!v){
   stockEl.textContent="Selecciona variante";
   return;
 }

 let price = v.precio;

 if(tienePromo){
   price = price - (price*descuento/100);
 }

 priceEl.textContent = money(price);

 if(v.stock > 5){
   stockEl.textContent=`Disponible (${v.stock})`;
   stockEl.className="stock ok";
   urgencyBox.textContent=`${Math.floor(Math.random()*7)+2} personas viendo este producto`;
 }

 else if(v.stock > 0){
   stockEl.textContent=`Últimas piezas (${v.stock})`;
   stockEl.className="stock low";
   urgencyBox.textContent=`Solo quedan ${v.stock} disponibles`;
 }

 else{
   stockEl.textContent="Agotado";
   stockEl.className="stock low";
   urgencyBox.textContent="Sin stock";
 }

}

function updateActive(){
document.querySelectorAll(".variant-options button")
.forEach(btn=>{
 btn.classList.toggle(
   "active",
   selected[btn.dataset.attr]===btn.dataset.value
 );
});
}

renderVariants();

if(vars.length){
 selected = {...vars[0].atributos};
 updateUI();
 updateActive();
}

/* ===== AJAX CART ===== */

async function addCart(){

 const v = findVariant();

 const body = {
   productoId: v ? v.id : null,
   cantidad:1
 };

 try{
   const r = await fetch("/carrito/agregar",{
     method:"POST",
     headers:{
       "Content-Type":"application/json"
     },
     body:JSON.stringify(body)
   });

   if(r.ok){
     alert("Producto agregado");
   }
 }catch(e){
   alert("Error");
 }

}

document.getElementById("btnComprar").onclick = addCart;
document.getElementById("mobileCart").onclick = addCart;

/* ===== WHATSAPP ===== */

function wa(){

 const txt = `Hola quiero comprar: ${productoNombre}`;
 const url = `https://wa.me/5210000000000?text=${encodeURIComponent(txt)}`;
 window.open(url,"_blank");

}

document.getElementById("btnWhatsapp").onclick = wa;
document.getElementById("mobileWa").onclick = wa;
</script>

</section>
</html>
