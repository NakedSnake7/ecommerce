<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Mis Pedidos | WeedTlanMx</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Estilos WeedTlan -->
    <link rel="stylesheet" href="/assets/css/foodhut.css">
    <link rel="stylesheet" href="/assets/css/custom-styles.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body>

<maya-loader></maya-loader>
<div id="particles-js"></div>

<!-- 👉 AQUÍ VA TU NAVBAR EXACTA (REUTILIZADA) -->
<div th:replace="fragments/navbar :: navbar"></div>

<!-- CONTENIDO -->
<section class="container py-5 mt-5">

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="glass-card p-4">

                <h3 class="mb-4 text-light">
                    <i class="bi bi-box-seam me-2"></i>
                    Mis pedidos
                </h3>

                <!-- SIN PEDIDOS -->
                <div th:if="${#lists.isEmpty(pedidos)}"
                     class="text-center py-5 text-muted">

                    <i class="bi bi-inbox fs-1 mb-3 d-block"></i>
                    <p class="mb-0">Aún no tienes pedidos realizados</p>
                </div>

                <!-- CON PEDIDOS -->
                <div th:if="${!#lists.isEmpty(pedidos)}"
                     class="table-responsive">

                    <table class="table table-dark table-borderless align-middle mb-0">

                        <thead>
                        <tr class="text-muted small">
                            <th># Pedido</th>
                            <th>Fecha</th>
                            <th>Total</th>
                            <th>Estado</th>
                            <th class="text-end"></th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="pedido : ${pedidos}"
                            class="border-bottom border-secondary-subtle">

                            <td th:text="${pedido.id}">1</td>

                            <td th:text="${#temporals.format(pedido.orderDate, 'dd/MM/yyyy HH:mm')}">
                                01/02/2025
                            </td>

                            <td>
                                $<span th:text="${pedido.total}">0.00</span>
                            </td>

                            <td>
                                <span class="badge px-3 py-2"
                                      th:classappend="${pedido.orderStatusBadge}"
                                      th:text="${pedido.orderStatusLabel}">
                                    Procesado
                                </span>
                            </td>

                            <td class="text-end">
                                <a th:href="@{/pedidos/{id}(id=${pedido.id})}"
                                   class="btn btn-outline-light btn-sm">
                                    Ver detalle
                                </a>
                            </td>

                        </tr>
                        </tbody>
                    </table>

                </div>

            </div>

        </div>
    </div>

</section>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

</body>
</html>
