<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sneakers Store</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== HERO ===== */
.hero-pro {
    height: 90vh;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    display: flex;
    align-items: center;
    color: white;
}

.hero-title {
    font-size: 3rem;
    font-weight: 900;
}

.hero-img {
    max-width: 100%;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px);}
    50% { transform: translateY(-15px);}
    100% { transform: translateY(0px);}
}

/* ===== CARDS ===== */
.sneaker-card {
    background: #111;
    color: white;
    border-radius: 16px;
    overflow: hidden;
    transition: .3s;
    position: relative;
}

.sneaker-card:hover {
    transform: translateY(-8px);
}

.img-container {
    padding: 20px;
    background: black;
}

.img-container img {
    width: 100%;
    transition: .3s;
}

.sneaker-card:hover img {
    transform: scale(1.1);
}

.price {
    color: #00ffae;
    font-size: 1.4rem;
    font-weight: bold;
}

.badge-top {
    position: absolute;
    top: 10px;
    left: 10px;
    background: gold;
    color: black;
    padding: 5px 10px;
    font-size: 0.7rem;
    border-radius: 6px;
}

.sizes span {
    border: 1px solid #444;
    padding: 5px 8px;
    margin: 2px;
    display: inline-block;
    border-radius: 6px;
    font-size: 0.75rem;
}

.quick-view-btn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: .3s;
}

.sneaker-card:hover .quick-view-btn {
    opacity: 1;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
    .hero-title { font-size: 2rem; }
    .hero-pro { height: auto; padding: 40px 0; }
}

</style>
</head>

<body style="background:black;">

<!-- ===== NAVBAR ===== -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ===== HERO ===== -->
<header class="hero-pro">
    <div class="container">
        <div class="row align-items-center">

            <div class="col-md-6">
                <h1 class="hero-title">DOMINA LA CALLE 👟🔥</h1>
                <p>Sneakers originales y réplicas premium. Edición limitada.</p>

                <a href="#catalogo" class="btn btn-danger btn-lg">
                    Comprar ahora 🚀
                </a>

                <p class="mt-3 text-warning small">
                    ⏳ +120 pares vendidos esta semana
                </p>
            </div>

            <div class="col-md-6 text-center">
                <img src="/assets/imgs/hero-sneaker.png" class="hero-img">
            </div>

        </div>
    </div>
</header>

<!-- ===== FILTROS ===== -->
<section class="container my-4 text-center">

    <button class="btn btn-outline-light filter-btn" data-filter="all">Todos</button>
    <button class="btn btn-outline-success filter-btn" data-filter="original">Originales</button>
    <button class="btn btn-outline-warning filter-btn" data-filter="replica">Réplicas</button>
    <button class="btn btn-outline-info filter-btn" data-filter="sport">Deportivos</button>
    <button class="btn btn-outline-danger filter-btn" data-filter="urban">Urbanos</button>

</section>

<!-- ===== CATÁLOGO ===== -->
<section id="catalogo" class="container my-5">

    <div class="row">

        <div class="col-md-4 mb-4"
             th:each="p : ${productos}"
             th:attr="data-category=${p.tipo + ' ' + p.categoria}">

            <div class="sneaker-card h-100">

                <!-- BADGE -->
                <div class="badge-top"
                     th:text="${p.tipo == 'original'} ? 'ORIGINAL' : 'REPLICA PREMIUM'">
                </div>

                <!-- IMG -->
                <div class="img-container">
                    <img th:src="${p.imagenUrl}">
                </div>

                <div class="p-3 text-center d-flex flex-column">

                    <h5 th:text="${p.nombre}"></h5>

                    <p class="price" th:text="'$' + ${p.precio}"></p>

                    <!-- URGENCIA -->
                    <p class="small text-danger"
                       th:if="${p.stock < 5}">
                        ⏳ Últimas piezas
                    </p>

                    <!-- TALLAS -->
                    <div class="sizes">
                        <span th:each="t : ${p.tallas}"
                              th:text="${t}"></span>
                    </div>

                    <!-- BOTONES -->
                    <div class="mt-auto">

                        <button class="btn btn-dark w-100 mt-3 add-to-cart"
                                th:attr="data-id=${p.id}">
                            Agregar 🛒
                        </button>

                        <a th:href="@{'https://wa.me/521XXXXXXXXXX?text=Me interesa ' + ${p.nombre}}"
                           class="btn btn-success w-100 mt-2">
                            WhatsApp 💬
                        </a>

                    </div>

                </div>

                <!-- QUICK VIEW -->
                <button class="quick-view-btn btn btn-light">
                    Ver 👁
                </button>

            </div>

        </div>

    </div>

</section>

<!-- ===== JS FILTROS ===== -->
<script>
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {

        const filter = btn.dataset.filter;

        document.querySelectorAll("[data-category]").forEach(card => {

            if (filter === "all" || card.dataset.category.includes(filter)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }

        });

    });
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
