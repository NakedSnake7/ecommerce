<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modificar Productos</title>

<!-- Bootstrap -->
<link
	href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
	rel="stylesheet">
<!-- Iconos y animaciones -->
<link rel="stylesheet"
	href="/assets/vendors/themify-icons/css/themify-icons.css">
<link rel="stylesheet" href="/assets/vendors/animate/animate.css">
<!-- Estilos personalizados -->
<link rel="stylesheet" href="/assets/css/custom-styles.css">

<style>
body {
	background-color: #2c2c2c;
	color: #fff;
	font-family: 'Arial', sans-serif;
}

.form-container {
	max-width: 800px;
	margin: 50px auto;
	padding: 30px;
	background-color: #333;
	box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
	border-radius: 8px;
}

.form-container h2 {
	text-align: center;
	color: #fff;
	margin-bottom: 30px;
}

.form-group label {
	font-weight: bold;
	color: #ccc;
}

.form-group input, .form-group textarea {
	border-radius: 8px;
	padding: 12px;
	width: 100%;
	border: 1px solid #555;
	font-size: 16px;
	background-color: #444;
	color: #fff;
}

.form-group input:focus, .form-group textarea:focus {
	border-color: #4CAF50;
	outline: none;
}

.form-group textarea {
	height: 150px;
}

.table-responsive {
	overflow-x: auto;
	-webkit-overflow-scrolling: touch;
	border-radius: 8px;
}

.subirProducto-btn {
	position: fixed;
	bottom: 20px;
	right: 20px;
	background-color: #4CAF50;
	color: white;
	padding: 12px 20px;
	border-radius: 50px;
	text-decoration: none;
	font-size: 16px;
	box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.3);
	transition: all 0.3s ease-in-out;
}

.subirProducto-btn:hover {
	background-color: #45a049;
	transform: scale(1.05);
}

@media ( max-width : 768px) {
	.subirProducto-btn {
		padding: 10px 16px;
		font-size: 14px;
		bottom: 15px;
		right: 15px;
	}
}
tr.bg-secondary {
  cursor: pointer;
}

tr.bg-secondary:hover {
  background-color: #4a4a4a !important;
}

.collapse td {
  transition: all 0.2s ease-in-out;
}

</style>
</head>
<body>
<div id="particles-js"></div>

	<h2 class="text-center">Lista de Productos</h2>

	<div class="container">
		<!-- Alertas de éxito o error -->
		<div th:if="${param.success}" class="alert alert-success" role="alert">
			Producto subido correctamente.</div>

		<div th:if="${param.error}" class="alert alert-danger" role="alert">
			<span th:switch="${param.error}"> <span
				th:case="'camposObligatorios'">Faltan campos obligatorios.</span> <span
				th:case="'errorInterno'">Ocurrió un error al subir el
					producto.</span> <span th:case="*">Error desconocido.</span>
			</span>
		</div>

		<div class="table-responsive">
			<table class="table table-dark table-striped">
				<thead>
					<tr>
						<th>ID</th>
						<th>Nombre</th>
						<th>Precio</th>
						<th>Stock</th>
						<th>Imagen</th>
						<th>Acciones</th>
						<th>Visible en Menú</th>
					</tr>
				</thead>
<tbody>

<th:block th:each="categoria : ${categorias}">

    <!-- FILA CATEGORÍA -->
    <tr>
        <td colspan="8" class="bg-secondary text-white font-weight-bold">

            <button class="btn btn-sm btn-light mr-2"
                    type="button"
                    data-toggle="collapse"
                    th:attr="data-target='#cat-' + ${#strings.replace(categoria.nombre,' ','_')}">
                ▼
            </button>

           <span th:text="${categoria.nombre}">Categoría</span>

<input type="checkbox"
       class="toggle-categoria ml-3"
       th:attr="data-categoria-id=${categoria.id}"
       th:checked="${categoria.todosVisibles}">

<span class="ml-1">Visible</span>



          

            <small class="ml-3 text-light"
                   th:text="'(' + ${#lists.size(categoria.productos)} + ' productos)'"></small>
        </td>
    </tr>

    <!-- PRODUCTOS DE LA CATEGORÍA -->
  <th:block th:each="producto : ${categoria.productos}">
    <tr class="collapse"
        th:id="'cat-' + ${#strings.replace(categoria.nombre,' ','_')}"
        th:attr="data-categoria-id=${categoria.id}"
        th:classappend="${!producto.visibleEnMenu} ? 'table-secondary'">

<td th:text="${producto.id}"></td>
<td th:text="${producto.productName}"></td>
<td th:text="'$' + ${producto.price}"></td>
<td th:text="${producto.stockTotal}"></td>
<td th:text="${producto.categoriaNombre}"></td>

<td>
    <img th:src="${producto.imageUrl}" width="50" height="50">
</td>

        <td>
            <a th:href="@{/editar/{id}(id=${producto.id})}"
               class="btn btn-warning btn-sm">Editar</a>

            <button class="btn btn-danger btn-sm delete-product"
                    th:attr="data-id=${producto.id}">
                Eliminar
            </button>

            <button type="button"
                    th:id="'togglePromo-' + ${producto.id}"
                    th:class="|btn btn-sm ${(producto.tienePromocion) ? 'btn-danger' : 'btn-success'}|"
                    th:text="${producto.tienePromocion ? 'Desactivar Promo' : 'Activar Promo'}"
                    th:onclick="'togglePromocion(' + ${producto.id} ')'">
            </button>
        </td>

        <td>
            <input type="checkbox"
                   class="toggle-visibility"
                   th:attr="
                       data-id=${producto.id},
                       data-categoria-id=${categoria.id}
                   "
                   th:checked="${producto.visibleEnMenu}">
        </td>

    </tr>
</th:block>


</th:block>

</tbody>



			</table>
		
		</div>
	</div>






	<!-- Scripts -->
	<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
	<script
		src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js", {
  "particles": {
    "number": {
      "value": 90,
      "density": { "enable": true, "value_area": 900 }
    },
    "color": {
      "value": ["#00ffcc", "#2bff99", "#00e6b8"]
    },
    "shape": { "type": "circle" },
    "opacity": {
      "value": 0.35,
      "random": true,
      "anim": {
        "enable": true,
        "speed": 0.8,
        "opacity_min": 0.05,
        "sync": false
      }
    },
    "size": {
      "value": 4,
      "random": true,
      "anim": {
        "enable": true,
        "speed": 2,
        "size_min": 0.6,
        "sync": false
      }
    },
    "line_linked": {
      "enable": true,
      "distance": 150,
      "color": "#00ffcc",
      "opacity": 0.35,
      "width": 1
    },
    "move": {
      "enable": true,
      "speed": 1.3,
      "direction": "none",
      "random": true,
      "straight": false,
      "out_mode": "out",
      "bounce": false
    }
  },
  "interactivity": {
    "detect_on": "canvas",
    "events": {
      "onhover": { "enable": true, "mode": "grab" },
      "onclick": { "enable": false },
      "resize": true
    },
    "modes": {
      "grab": { 
        "distance": 200,
        "line_linked": { "opacity": 0.8 }
      }
    }
  },
  "retina_detect": true
});
</script>
		

	<script>
	document.addEventListener("DOMContentLoaded", function () {
	    // Eliminar producto
	    document.querySelectorAll(".delete-product").forEach(button => {
	        button.addEventListener("click", function () {
	            let productId = this.getAttribute("data-id");
	            if (confirm("¿Estás seguro de que quieres eliminar este producto?")) {
	                fetch(`/api/productos/${productId}`, { method: "DELETE" })
	                .then(response => {
	                    if (response.ok) {
	                        alert("Producto eliminado correctamente.");
	                        location.reload();
	                    } else {
	                        alert("Error al eliminar el producto.");
	                    }
	                })
	                .catch(error => console.error("Error:", error));
	            }
	        });
	    });

	    // Alternar visibilidad
	    document.querySelectorAll(".toggle-visibility").forEach(checkbox => {
	        checkbox.addEventListener("change", function () {
	            const id = this.getAttribute("data-id");
	            const checkboxEl = this;

	            fetch('/api/productos/toggleVisibility', {
	                method: 'POST',
	                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
	                body: `productoId=${id}`
	            })
	            .then(response => response.json())
	            .then(nuevoEstado => {
	                checkboxEl.checked = nuevoEstado;
	            })
	            .catch(error => {
	                console.error("Error:", error);
	                alert("Error al comunicar con el servidor.");
	                checkboxEl.checked = !checkboxEl.checked;
	            });
	        });
	    });
	});

	// Toggle promoción
	function togglePromocion(productoId) {
	    fetch('/api/productos/togglePromocion', {
	        method: 'POST',
	        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
	        body: new URLSearchParams({ productoId: productoId })
	    })
	    .then(response => response.json())
	    .then(enPromocion => {
	        const btn = document.getElementById('togglePromo-' + productoId);
	        btn.textContent = enPromocion ? 'Desactivar Promo' : 'Activar Promo';
	        btn.className = 'btn btn-sm ' + (enPromocion ? 'btn-danger' : 'btn-success');
	    })
	    .catch(error => console.error('Error al alternar promoción:', error));
	}

  </script>
<script>
document.querySelectorAll('.toggle-categoria').forEach(catCheckbox => {

    catCheckbox.addEventListener('change', function () {

    	const categoriaId = this.getAttribute('data-categoria-id');
        const visible = this.checked;

        fetch('/api/productos/toggleCategoria', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
            	categoriaId: categoriaId,
                visible: visible
            })
        })
        .then(response => {
            if (!response.ok) throw new Error('Error backend');
            actualizarUIcategoria(categoriaId, visible);        })
        .catch(err => {
            console.error(err);
            alert('Error al actualizar la categoría');
            this.checked = !visible; // rollback visual
        });
    });

});

/* ===============================
   ACTUALIZAR UI SIN RECARGAR
================================ */
function actualizarUIcategoria(categoria, visible) {

    // 1️⃣ Checkboxes individuales
    document.querySelectorAll(
    		`.toggle-visibility[data-categoria-id="${categoria}"]`
    		).forEach(cb => {
        cb.checked = visible;
    });

    // 2️⃣ Filas visuales
    document.querySelectorAll(
        `tr[data-categoria="${categoria}"]`
    ).forEach(row => {
        row.classList.toggle('table-secondary', !visible);
    });
}
</script>

  
  <!-- Botón para regresar a servicio.html -->
    <a href="/servicio" class="btn btn-maya btn-fixed">⬅ Volver a Servicios</a>
</body>
</html>
