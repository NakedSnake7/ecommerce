<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ver Productos PRO MAX</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<link rel="stylesheet"
href="/assets/vendors/themify-icons/css/themify-icons.css">

<style>
:root{
    --bg:#111;
    --card:#1b1b1b;
    --card2:#222;
    --green:#00e6a7;
    --green2:#00c78e;
    --danger:#ff4d5a;
    --warning:#ffc107;
    --text:#fff;
    --muted:#bbb;
    --border:#333;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#111,#181818,#101010);
    color:var(--text);
    font-family:Arial,Helvetica,sans-serif;
    min-height:100vh;
}

/* HEADER */
.topbar{
    padding:25px;
    text-align:center;
}

.topbar h1{
    font-size:34px;
    font-weight:800;
    margin-bottom:8px;
}

.topbar p{
    color:var(--muted);
}

/* PANEL */
.panel{
    max-width:1500px;
    margin:auto;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:18px;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,.35);
}

/* SEARCH */
.search-box{
    display:flex;
    gap:10px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.search-box input{
    flex:1;
    min-width:250px;
    border:none;
    outline:none;
    background:#222;
    color:#fff;
    padding:12px 15px;
    border-radius:10px;
}

.btn-pro{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    color:#fff;
    cursor:pointer;
    font-weight:700;
}

.btn-green{background:var(--green);}
.btn-green:hover{background:var(--green2);}

.btn-danger{background:var(--danger);}
.btn-warning{background:var(--warning); color:#000;}
.btn-info{background:#17a2b8;}

.table-wrap{
    overflow:auto;
    border-radius:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1200px;
}

thead{
    background:#1f1f1f;
}

th,td{
    padding:14px;
    border-bottom:1px solid var(--border);
    text-align:center;
    vertical-align:middle;
}

tbody tr{
    transition:.25s;
}

tbody tr:hover{
    background:#1e1e1e;
}

/* CATEGORY */
.category-row{
    background:#242424 !important;
    font-size:18px;
    font-weight:800;
    cursor:pointer;
}

.category-row:hover{
    background:#2b2b2b !important;
}

/* PRODUCT IMG */
.product-img{
    width:58px;
    height:58px;
    object-fit:cover;
    border-radius:12px;
    border:2px solid #333;
}

/* BADGES */
.badge-pro{
    padding:6px 10px;
    border-radius:30px;
    font-size:12px;
    font-weight:700;
    display:inline-block;
}

.bg-variant{background:#3498db;}
.bg-promo{background:#e74c3c;}
.bg-stock{background:#16a085;}
.bg-out{background:#555;}

/* VARIANT BOX */
.variant-table{
    background:#191919;
    border-radius:10px;
    overflow:hidden;
}

.variant-table td,
.variant-table th{
    border-color:#2d2d2d;
}

/* FLOAT BUTTON */
.float-btn{
    position:fixed;
    bottom:25px;
    right:25px;
    z-index:99;
}

/* MOBILE */
@media(max-width:768px){

    .topbar h1{
        font-size:26px;
    }

    .panel{
        padding:15px;
        margin:10px;
    }

    .search-box{
        flex-direction:column;
    }

    .float-btn{
        bottom:15px;
        right:15px;
    }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
    <h1>📦 Administración de Productos</h1>
    <p>Panel PRO MAX • Variantes • Promociones • Categorías</p>
</div>

<!-- MAIN -->
<div class="panel">

    <!-- ALERTAS -->
    <div th:if="${param.success}" class="alert alert-success">
        Operación realizada correctamente.
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Ocurrió un error.
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="searchInput"
        placeholder="Buscar producto...">

        <button class="btn-pro btn-green"
        onclick="expandirTodo()">
        Expandir Todo
        </button>

        <button class="btn-pro btn-info"
        onclick="colapsarTodo()">
        Colapsar Todo
        </button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">

<table class="table table-dark">

<thead>
<tr>
<th>ID</th>
<th>Producto</th>
<th>Precio</th>
<th>Stock</th>
<th>Imagen</th>
<th>Acciones</th>
<th>Visible</th>
</tr>
</thead>

<tbody>

<th:block th:each="categoria : ${categorias}">

<!-- CATEGORIA -->
<tr class="category-row"
data-toggle="collapse"
th:attr="data-target='#cat-' + ${categoria.id}">
<td colspan="7">

📁 <span th:text="${categoria.nombre}"></span>

<span class="badge badge-light ml-3"
th:text="${#lists.size(categoria.productos)} + ' productos'">
</span>

<input type="checkbox"
class="ml-4 toggle-categoria"
th:attr="data-categoria-id=${categoria.id}"
th:checked="${categoria.todosVisibles}">

Visible

</td>
</tr>

<!-- PRODUCTOS -->
<th:block th:each="producto : ${categoria.productos}">

<tr class="collapse producto-row"
th:id="'cat-' + ${categoria.id}"
th:attr="data-name=${producto.productName}">

<td th:text="${producto.id}"></td>

<td>

<b th:text="${producto.productName}"></b>
<br>

<span th:if="${producto.tieneVariantes}"
class="badge-pro bg-variant">
Variantes
</span>

<span th:if="${producto.tienePromocion}"
class="badge-pro bg-promo">
Promo
</span>

</td>

<td>

<div th:if="${producto.tienePromocion}">
<small style="text-decoration:line-through;">
$<span th:text="${producto.precio}"></span>
</small>
<br>
<b style="color:#00e6a7;">
$<span th:text="${producto.precioFinal}"></span>
</b>
</div>

<div th:if="${!producto.tienePromocion}">
<span th:if="${producto.tieneVariantes}">
Desde $
<span th:text="${producto.precioMinimo}"></span>
</span>

<span th:if="${!producto.tieneVariantes}">
$
<span th:text="${producto.precio}"></span>
</span>
</div>

</td>

<td>

<span th:if="${producto.tieneStock()}"
class="badge-pro bg-stock">
<span th:text="${producto.stockSimple}"></span>
</span>

<span th:if="${!producto.tieneStock()}"
class="badge-pro bg-out">
Sin stock
</span>

</td>

<td>

<img class="product-img"
loading="lazy"
th:src="${producto.imageUrl != null ? producto.imageUrl : '/img/default.jpg'}">

</td>

<td>

<a th:href="@{/editar/{id}(id=${producto.id})}"
class="btn btn-warning btn-sm">
Editar
</a>

<button class="btn btn-danger btn-sm delete-product"
th:attr="data-id=${producto.id}">
Eliminar
</button>

<button type="button"
class="btn btn-success btn-sm"
th:id="'promoBtn-' + ${producto.id}"
th:onclick="'togglePromo(' + ${producto.id} + ')'">
Promo
</button>

<button th:if="${producto.tieneVariantes}"
class="btn btn-info btn-sm"
data-toggle="collapse"
th:attr="data-target='#var-' + ${producto.id}">
Ver Variantes
</button>

</td>

<td>

<input type="checkbox"
class="toggle-visibility"
th:attr="data-id=${producto.id}"
th:checked="${producto.visibleEnMenu}">

</td>

</tr>

<!-- VARIANTES -->
<tr class="collapse"
th:id="'var-' + ${producto.id}">

<td colspan="7">

<table class="table table-sm table-dark variant-table">

<thead>
<tr>
<th>Atributos</th>
<th>Stock</th>
<th>Precio</th>
</tr>
</thead>

<tbody>

<tr th:each="var : ${producto.variantes}">

<td>

<span th:if="${var.atributos != null and !var.atributos.isEmpty()}"
      th:each="attr,attrStat : ${var.atributos.entrySet()}">

<b th:text="${attr.key}"></b>:
<span th:text="${attr.value}"></span>

<span th:if="${!attrStat.last}"> | </span>

</span>

<span th:if="${var.atributos == null or var.atributos.isEmpty()}">
Sin atributos
</span>

</td>

<td th:text="${var.stock}"></td>

<td>
$
<span th:text="${var.precio != null ? var.precio : producto.precio}"></span>
</td>

</tr>
</tbody>
</table>

</td>
</tr>

</th:block>
</th:block>

</tbody>
</table>
</div>
</div>

<!-- FLOAT -->
<a href="/servicio"
class="btn btn-success float-btn">
⬅ Volver
</a>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
/* BUSCADOR */
document.getElementById("searchInput")
.addEventListener("keyup", function(){

let value = this.value.toLowerCase();

document.querySelectorAll(".producto-row")
.forEach(row=>{

let name =
row.getAttribute("data-name").toLowerCase();

row.style.display =
name.includes(value)
? ""
: "none";

});
});

/* EXPANDIR */
function expandirTodo(){
$('.collapse').collapse('show');
}

/* COLAPSAR */
function colapsarTodo(){
$('.collapse').collapse('hide');
}

/* ELIMINAR */
document.querySelectorAll('.delete-product')
.forEach(btn=>{

btn.onclick=function(){

const id=this.dataset.id;

if(confirm("¿Eliminar producto?")){

fetch('/api/productos/'+id,{
method:'DELETE'
})
.then(r=>{
if(r.ok) location.reload();
else alert("Error");
});

}

};

});

/* VISIBILIDAD */
document.querySelectorAll('.toggle-visibility')
.forEach(chk=>{

chk.onchange=function(){

fetch('/api/productos/toggleVisibility',{
method:'POST',
headers:{
'Content-Type':
'application/x-www-form-urlencoded'
},
body:'productoId='+this.dataset.id
});

};

});

/* PROMO */
function togglePromo(id){

fetch('/api/productos/togglePromocion',{
method:'POST',
headers:{
'Content-Type':
'application/x-www-form-urlencoded'
},
body:'productoId='+id
})
.then(()=>location.reload());

}
</script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js",{
	  "particles": {
		    "number": {
		      "value": 90,
		      "density": { "enable": true, "value_area": 900 }
		    },
		    "color": {
		      "value": ["#00ffcc", "#2bff99", "#00e6b8"]
		    },
		    "shape": { "type": "circle" },
		    "opacity": {
		      "value": 0.35,
		      "random": true,
		      "anim": {
		        "enable": true,
		        "speed": 0.8,
		        "opacity_min": 0.05,
		        "sync": false
		      }
		    },
		    "size": {
		      "value": 4,
		      "random": true,
		      "anim": {
		        "enable": true,
		        "speed": 2,
		        "size_min": 0.6,
		        "sync": false
		      }
		    },
		    "line_linked": {
		      "enable": true,
		      "distance": 150,
		      "color": "#00ffcc",
		      "opacity": 0.35,
		      "width": 1
		    },
		    "move": {
		      "enable": true,
		      "speed": 1.3,
		      "direction": "none",
		      "random": true,
		      "straight": false,
		      "out_mode": "out",
		      "bounce": false
		    }
		  },
		  "interactivity": {
		    "detect_on": "canvas",
		    "events": {
		      "onhover": { "enable": true, "mode": "grab" },
		      "onclick": { "enable": false },
		      "resize": true
		    },
		    "modes": {
		      "grab": { 
		        "distance": 200,
		        "line_linked": { "opacity": 0.8 }
		      }
		    }
		  },
		  "retina_detect": true
		});
</script>
</body>
</html>
