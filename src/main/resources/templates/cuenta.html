<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Mi Cuenta | WeedTlanMx</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Estilos WeedTlan -->
    <link rel="stylesheet" href="/assets/css/foodhut.css">
    <link rel="stylesheet" href="/assets/css/custom-styles.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body>

<maya-loader></maya-loader>
<div id="particles-js"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<section class="container py-5 mt-5">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="glass-card p-4">

                <h3 class="mb-4 text-light">
                    <i class="bi bi-person-circle me-2"></i>
                    Mi cuenta
                </h3>

                <!-- ========================= -->
                <!-- VISTA (LECTURA) -->
                <!-- ========================= -->
                <div id="vistaCuenta">

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <small class="text-muted">Nombre</small>
                            <p class="mb-0"
                               th:text="${usuario.fullName}">
                            </p>
                        </div>

                        <div class="col-md-6">
                            <small class="text-muted">Email</small>
                            <p class="mb-0"
                               th:text="${usuario.email}">
                            </p>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <small class="text-muted">Teléfono</small>
                            <p class="mb-0"
                               th:text="${usuario.phone}">
                            </p>
                        </div>
                    </div>

                    <hr class="border-secondary">

                    <!-- DIRECCIÓN -->
                    <h5 class="mt-4 text-light">
                        <i class="bi bi-geo-alt me-2"></i>
                        Dirección de envío
                    </h5>

                    <form th:action="@{/cuenta/direccion}"
                          method="post"
                          class="mt-3">

                        <div class="mb-3">
                            <textarea name="address"
                                      class="form-control glass-input"
                                      rows="3"
                                      th:text="${direccion}"
                                      placeholder="Calle, número, colonia, ciudad, estado, CP">
                            </textarea>
                        </div>

                        <button class="btn btn-maya">
                            Guardar dirección
                        </button>
                    </form>

                    <hr class="border-secondary mt-4">

                    <div class="d-flex gap-2 flex-wrap">
                        <button class="btn btn-outline-light"
                                onclick="activarEdicion()">
                            Editar datos
                        </button>

                        <a href="/logout"
                           class="btn btn-outline-danger">
                            Cerrar sesión
                        </a>
                    </div>

                </div>

                <!-- ========================= -->
                <!-- FORMULARIO (EDICIÓN) -->
                <!-- ========================= -->
                <div id="formEdicion" class="d-none">

                    <form th:action="@{/cuenta/actualizar}"
                          method="post">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted">
                                    Nombre
                                </label>
                                <input type="text"
                                       name="fullName"
                                       class="form-control glass-input"
                                       th:value="${usuario.fullName}"
                                       required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label text-muted">
                                    Email
                                </label>
                                <input type="email"
                                       class="form-control glass-input"
                                       th:value="${usuario.email}"
                                       disabled>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label text-muted">
                                    Teléfono
                                </label>
                                <input type="text"
                                       name="phone"
                                       class="form-control glass-input"
                                       th:value="${usuario.phone}">
                            </div>
                        </div>

                        <hr class="border-secondary">

                        <div class="d-flex gap-2 flex-wrap">
                            <button type="submit"
                                    class="btn btn-success">
                                Guardar cambios
                            </button>

                            <button type="button"
                                    class="btn btn-outline-secondary"
                                    onclick="cancelarEdicion()">
                                Cancelar
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</section>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
    function activarEdicion() {
        document.getElementById("vistaCuenta").classList.add("d-none");
        document.getElementById("formEdicion").classList.remove("d-none");
    }

    function cancelarEdicion() {
        document.getElementById("formEdicion").classList.add("d-none");
        document.getElementById("vistaCuenta").classList.remove("d-none");
    }
</script>

</body>
</html>
