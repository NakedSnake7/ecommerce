<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos Premium</title>

<link rel="stylesheet"
href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<link rel="stylesheet"
href="/assets/vendors/themify-icons/css/themify-icons.css">

<style>
:root{
--bg:#0d1117;
--card:#161b22;
--card2:#1f2630;
--line:#2d3748;
--green:#00ffb3;
--blue:#00c3ff;
--gold:#ffc857;
--danger:#ff5c77;
--text:#fff;
--muted:#9ca3af;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#0b0f14,#111827,#0d1117);
color:var(--text);
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
min-height:100vh;
}

.topbar{
padding:30px;
text-align:center;
}

.topbar h1{
font-size:38px;
font-weight:900;
letter-spacing:1px;
}

.topbar p{
color:var(--muted);
margin-top:8px;
}

.panel{
max-width:1700px;
margin:auto;
padding:25px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.05);
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 25px 60px rgba(0,0,0,.35);
}

.search-box{
display:flex;
gap:12px;
margin-bottom:25px;
flex-wrap:wrap;
}

.search-box input{
flex:1;
min-width:250px;
background:#111827;
border:1px solid #263042;
color:#fff;
padding:12px 15px;
border-radius:12px;
outline:none;
}

.btn-premium{
border:none;
padding:11px 18px;
border-radius:12px;
font-weight:700;
cursor:pointer;
color:#fff;
transition:.25s;
}

.btn-green{background:var(--green); color:#000;}
.btn-blue{background:var(--blue);}
.btn-gold{background:var(--gold); color:#000;}
.btn-red{background:var(--danger);}

.btn-premium:hover{
transform:translateY(-2px);
opacity:.95;
}

.table-wrap{
overflow:auto;
border-radius:16px;
}

table{
width:100%;
min-width:1500px;
border-collapse:collapse;
}

thead{
background:#111827;
}

th,td{
padding:14px;
border-bottom:1px solid var(--line);
text-align:center;
vertical-align:middle;
}

tbody tr:hover{
background:rgba(255,255,255,.02);
}

.category-row{
background:#1c2330 !important;
font-size:18px;
font-weight:800;
cursor:pointer;
}

.product-img{
width:60px;
height:60px;
border-radius:14px;
object-fit:cover;
border:2px solid #2d3748;
}

.badge-pro{
padding:6px 12px;
border-radius:40px;
font-size:12px;
font-weight:700;
display:inline-block;
margin:2px;
}

.bg-promo{background:#ff4d67;}
.bg-var{background:#00c3ff;}
.bg-stock{background:#00ffb3; color:#000;}
.bg-out{background:#555;}
.bg-brand{background:#ffc857; color:#000;}

.variant-box{
background:#10151d;
border-radius:14px;
padding:10px;
}

.float-btn{
position:fixed;
right:25px;
bottom:25px;
z-index:999;
}

@media(max-width:768px){
.topbar h1{font-size:28px;}
.panel{margin:10px;padding:15px;}
.search-box{flex-direction:column;}
}
</style>
</head>

<body>

<div class="topbar">
<h1>📦 Productos Premium</h1>
<p>Vista avanzada con marcas + variantes desplegables</p>
</div>

<div class="panel">

<div class="search-box">

<input type="text"
id="searchInput"
placeholder="Buscar producto...">

<button class="btn-premium btn-green"
onclick="expandirTodo()">
Expandir Todo
</button>

<button class="btn-premium btn-blue"
onclick="colapsarTodo()">
Colapsar Todo
</button>

</div>

<div class="table-wrap">

<table class="table table-dark">

<thead>
<tr>
<th>ID</th>
<th>Imagen</th>
<th>Producto</th>
<th>Marca</th>
<th>Precio</th>
<th>Stock</th>
<th>Acciones</th>
<th>Visible</th>
</tr>
</thead>

<tbody>

<th:block th:each="categoria : ${categorias}">

<tr class="category-row"
data-toggle="collapse"
th:attr="data-target='#cat-'+${categoria.id}">
<td colspan="8">

📁 <span th:text="${categoria.nombre}"></span>

<span class="badge badge-light ml-3"
th:text="${#lists.size(categoria.productos)} + ' productos'"></span>

<input type="checkbox"
class="ml-4 toggle-categoria"
th:attr="data-categoria-id=${categoria.id}"
th:checked="${categoria.todosVisibles}">

Visible

</td>
</tr>

<th:block th:each="producto : ${categoria.productos}">

<tr class="collapse producto-row"
th:id="'cat-'+${categoria.id}"
th:attr="data-name=${producto.productName}">

<td th:text="${producto.id}"></td>

<td>
<img class="product-img"
th:src="${producto.imageUrl}">
</td>

<td>

<b th:text="${producto.productName}"></b><br>

<span th:if="${producto.tienePromocion}"
class="badge-pro bg-promo">
Promo
</span>

<span th:if="${producto.tieneVariantes}"
class="badge-pro bg-var">
Variantes
</span>

</td>

<td>

<span th:if="${producto.marcaNombre != null}"
class="badge-pro bg-brand"
th:text="${producto.marcaNombre}">
</span>

<span th:if="${producto.marcaNombre == null}">
Sin marca
</span>

</td>

<td>

<div th:if="${producto.tienePromocion}">
    <small style="text-decoration:line-through">
$<span th:text="${#numbers.formatDecimal(producto.precio,1,2)}"></span>
    </small><br>

    <b style="color:#00ffb3">
        $<span th:text="${#numbers.formatDecimal(
            producto.precio - (producto.precio * producto.porcentajeDescuento / 100),
            1,2)}"></span>
    </b>
</div>

<div th:if="${!producto.tienePromocion}">

<span th:if="${producto.tieneVariantes}">
Desde $
<span th:text="${producto.precioMinimo}"></span>
</span>

<span th:if="${!producto.tieneVariantes}">
$
<span th:text="${producto.precio}"></span>
</span>

</div>

</td>

<td>

<span th:if="${producto.stockTotal > 0}"
      class="badge-pro bg-stock"
      th:text="${producto.stockTotal}">
</span>

<span th:if="${producto.stockTotal <= 0}"
      class="badge-pro bg-out">
Sin stock
</span>

</td>

<td>

<a th:href="@{/editar/{id}(id=${producto.id})}"
class="btn btn-warning btn-sm">
Editar
</a>

<button class="btn btn-danger btn-sm delete-product"
th:attr="data-id=${producto.id}">
Eliminar
</button>

<button class="btn btn-success btn-sm"
th:onclick="'togglePromo('+${producto.id}+');'">
Promo
</button>

<button th:if="${producto.tieneVariantes}"
class="btn btn-info btn-sm"
data-toggle="collapse"
th:attr="data-target='#var-'+${producto.id}">
Ver Variantes
</button>

</td>

<td>

<input type="checkbox"
class="toggle-visibility"
th:attr="data-id=${producto.id}"
th:checked="${producto.visibleEnMenu}">

</td>

</tr>

<!-- DESGLOSE VARIANTES -->
<tr class="collapse"
th:id="'var-'+${producto.id}"
th:if="${producto.tieneVariantes}">

<td colspan="8">

<div class="variant-box">

<table class="table table-sm table-dark mb-0">

<thead>
<tr>
<th>Atributos</th>
<th>Precio</th>
<th>Stock</th>
</tr>
</thead>

<tbody>

<tr th:each="v : ${producto.variantes}">

<td>

<span th:each="a,stat : ${v.atributos.entrySet()}">

<b th:text="${a.key}"></b>:
<span th:text="${a.value}"></span>

<span th:if="${!stat.last}">
|
</span>

</span>

</td>

<td>
$
<span th:text="${v.precio}"></span>
</td>

<td th:text="${v.stock}"></td>

</tr>

</tbody>

</table>

</div>

</td>
</tr>

</th:block>
</th:block>

</tbody>
</table>

</div>
</div>




<div>
    <button type="button"
       class="btn btn-success float-btn"
            onclick="history.back()">
     ⬅ Volver
    </button>
</div>


<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
document.getElementById("searchInput")
.addEventListener("keyup",function(){

let val=this.value.toLowerCase();

document.querySelectorAll(".producto-row")
.forEach(row=>{

let name=row.dataset.name.toLowerCase();

row.style.display=
name.includes(val)?"":"none";

});
});

function expandirTodo(){
$('.collapse').collapse('show');
}

function colapsarTodo(){
$('.collapse').collapse('hide');
}

document.querySelectorAll('.delete-product')
.forEach(btn=>{

btn.onclick=function(){

if(confirm("¿Eliminar producto?")){

fetch('/api/productos/'+this.dataset.id,{
method:'DELETE'
})
.then(()=>location.reload());

}

};

});

document.querySelectorAll('.toggle-visibility')
.forEach(chk=>{

chk.onchange=function(){

fetch('/api/productos/toggleVisibility',{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:'productoId='+this.dataset.id
});

};

});

function togglePromo(id){

fetch('/api/productos/togglePromocion',{
method:'POST',
headers:{
'Content-Type':'application/x-www-form-urlencoded'
},
body:'productoId='+id
})
.then(()=>location.reload());

}
</script>

</body>
</html>
