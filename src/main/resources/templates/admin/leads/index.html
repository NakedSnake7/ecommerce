<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout/main :: layout(
        'Leads | WebEmpresarial Admin',
        ~{::content}
)}">

<body>

<th:block th:fragment="content">

<section>

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <span class="badge text-bg-success mb-2">
                CRM
            </span>

            <h1 class="fw-bold mb-1">
                Leads
            </h1>

            <p class="text-muted mb-0">
                Gestión de solicitudes capturadas desde WebEmpresarial™
            </p>
        </div>

        <div>
            <span class="badge rounded-pill text-bg-dark fs-6"
                  th:text="${#lists.size(leads) + ' leads'}">
            </span>
        </div>

    </div>

    <!-- TABLE CARD -->
    <div class="card border-0 shadow-sm">

        <div class="table-responsive">

            <table class="table align-middle mb-0">

                <!-- HEAD -->
                <thead class="table-light">

                <tr>
                    <th>ID</th>
                    <th>Lead</th>
                    <th>Servicio</th>
                    <th>Presupuesto</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>

                </thead>

                <!-- BODY -->
                <tbody>

                <tr th:each="lead : ${leads}">

                    <!-- ID -->
                    <td>
                        <strong th:text="${lead.id}"></strong>
                    </td>

                    <!-- LEAD INFO -->
                    <td>

                        <div class="fw-semibold"
                             th:text="${lead.nombre}">
                        </div>

                        <div class="small text-muted"
                             th:text="${lead.empresa}">
                        </div>

                        <div class="small">

                            <a class="text-decoration-none"
                               target="_blank"
                               th:href="@{'https://wa.me/52' + ${lead.whatsapp}}">

                                <span th:text="${lead.whatsapp}"></span>

                            </a>

                        </div>

                        <div class="small text-muted"
                             th:text="${lead.instagram}">
                        </div>

                    </td>

                    <!-- SERVICIO -->
                    <td>

                        <span class="badge rounded-pill text-bg-dark"
                              th:text="${lead.servicio}">
                        </span>

                    </td>

                    <!-- PRESUPUESTO -->
                    <td>

                        <span class="fw-semibold"
                              th:text="${lead.presupuesto}">
                        </span>

                    </td>

                    <!-- STATUS -->
                    <td>

                        <form method="post"
                              class="d-flex gap-2 align-items-center"
                              th:action="@{'/admin/leads/' + ${lead.id} + '/status'}">

                            <select name="status"
                                    class="form-select form-select-sm">

                                <option th:each="status : ${statuses}"
                                        th:value="${status}"
                                        th:text="${status}"
                                        th:selected="${status == lead.status}">
                                </option>

                            </select>

                            <button type="submit"
                                    class="btn btn-primary btn-sm">

                                Guardar

                            </button>

                        </form>

                    </td>

                    <!-- FECHA -->
                    <td>

                        <div class="small text-muted"
                             th:text="${#temporals.format(
                                lead.createdAt,
                                'dd/MM/yyyy HH:mm'
                             )}">
                        </div>

                    </td>

                    <!-- ACTIONS -->
                    <td>

                        <div class="d-flex gap-2">

                            <a class="btn btn-success btn-sm"
                               target="_blank"
                               th:href="@{'https://wa.me/52' + ${lead.whatsapp}}">

                                WhatsApp

                            </a>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</section>

</th:block>

</body>
</html>
