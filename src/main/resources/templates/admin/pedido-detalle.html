<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Detalle del Pedido | WeedTlanMx</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Estilos WeedTlan -->
    <link rel="stylesheet" href="/assets/css/foodhut.css">
    <link rel="stylesheet" href="/assets/css/custom-styles.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body>

<maya-loader></maya-loader>
<div id="particles-js"></div>

<!-- NAVBAR -->
<div th:replace="fragments/navbar :: navbar"></div>

<section class="container py-5 mt-5">

    <!-- HEADER PEDIDO -->
    <div class="glass-card p-4 mb-4">

        <div class="d-flex flex-wrap justify-content-between align-items-center">
            <div>
                <h3 class="mb-1 text-light">
                    Pedido #<span th:text="${pedido.id}"></span>
                </h3>

                <p class="text-muted mb-0">
                    Fecha:
                    <span th:text="${#temporals.format(pedido.orderDate, 'dd/MM/yyyy HH:mm')}"></span>
                </p>
            </div>

            <div>
                <span class="badge px-3 py-2 fs-6"
                      th:classappend="${pedido.orderStatusBadge}"
                      th:text="${pedido.orderStatusLabel}">
                    Procesado
                </span>
            </div>
        </div>

    </div>

    <!-- PRODUCTOS -->
    <div class="glass-card p-4 mb-4">

        <h5 class="mb-3 text-light">
            <i class="bi bi-box-seam me-2"></i>
            Productos
        </h5>

        <div class="table-responsive">
            <table class="table table-dark table-borderless align-middle mb-0">

                <thead>
                <tr class="text-muted small">
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio</th>
                    <th class="text-end">Total</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="item : ${pedido.items}"
                    class="border-bottom border-secondary-subtle">

                    <td th:text="${item.producto.productName}"></td>

                    <td th:text="${item.quantity}"></td>

                    <td>
                        $<span th:text="${item.price}"></span>
                    </td>

                    <td class="text-end">
                        $<span th:text="${item.quantity * item.price}"></span>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>

        <div class="text-end mt-3">
            <h5 class="text-light">
                Total:
                $<span th:text="${pedido.total}"></span> MXN
            </h5>
        </div>

    </div>

    <!-- DIRECCIÓN + PAGO -->
    <div class="row">

        <!-- DIRECCIÓN -->
        <div class="col-lg-6 mb-4">
            <div class="glass-card p-4 h-100">

                <h5 class="mb-3 text-light">
                    <i class="bi bi-geo-alt me-2"></i>
                    Dirección de envío
                </h5>

                <p class="mb-1 fw-semibold"
                   th:text="${pedido.customerName}">
                </p>

                <p class="mb-1"
                   th:text="${pedido.address}">
                </p>

                <p class="mb-0 text-muted">
                    <i class="bi bi-envelope me-1"></i>
                    <span th:text="${pedido.customerEmail}"></span>
                </p>

            </div>
        </div>

        <!-- PAGO + TRACKING -->
        <div class="col-lg-6 mb-4">
            <div class="glass-card p-4 h-100">

                <h5 class="mb-3 text-light">
                    <i class="bi bi-credit-card me-2"></i>
                    Pago y envío
                </h5>

                <p class="mb-2">
                    Método de pago:
                    <strong th:text="${pedido.paymentMethod}"></strong>
                </p>

                <p th:if="${pedido.paymentStatus.name() == 'PENDING'}"
                   class="text-warning mb-2">
                    Pago pendiente de confirmación
                </p>

                <p th:if="${pedido.paymentStatus.name() == 'PAID'}"
                   class="text-success mb-2">
                    Pago confirmado
                </p>

                <hr class="border-secondary">

                <p th:if="${pedido.trackingNumber != null}">
                    Paquetería:
                    <strong th:text="${pedido.carrier}"></strong><br>
                    Guía:
                    <strong th:text="${pedido.trackingNumber}"></strong>
                </p>

                <p class="text-muted"
                   th:if="${pedido.trackingNumber == null}">
                    Aún no se ha asignado número de guía.
                </p>

            </div>
        </div>

    </div>

</section>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

</body>
</html>
